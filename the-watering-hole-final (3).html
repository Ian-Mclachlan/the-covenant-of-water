<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Watering Hole — A Post-Cohesion Safari Fable</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a150a;--bg2:#132013;--bg3:#1c2e1c;--gold:#c8a84e;--goldL:#dfc87a;--goldDim:rgba(200,168,78,0.12);--parch:#e8dcc8;--dim:#a09880;--light:#f5f0e1;--water:#4a8b9e;--ember:#d4763c;--belong:#7b5ea7;--danger:#9e3a3a;--dangerL:#c87070;--serif:'Crimson Pro',Georgia,serif;--sans:'Outfit',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--light);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(200,168,78,0.25);border-radius:3px}
.splash{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:1.5rem;position:relative;overflow:hidden;opacity:0;animation:fadeUp 1.8s ease forwards 0.2s}
.splash::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 75%,rgba(200,168,78,0.06) 0%,transparent 55%),radial-gradient(ellipse at 20% 20%,rgba(74,139,158,0.04) 0%,transparent 40%);pointer-events:none}
.splash img{width:min(92%,500px);border-radius:8px;margin-bottom:1.5rem;opacity:0.9;box-shadow:0 12px 50px rgba(0,0,0,0.6)}
.splash h1{font-family:var(--serif);font-size:clamp(2.2rem,6vw,4rem);font-weight:700;color:var(--gold);line-height:1.05;margin-bottom:0.3rem;text-shadow:0 2px 30px rgba(200,168,78,0.15)}
.splash .epi{font-family:var(--serif);font-size:clamp(0.8rem,1.8vw,0.95rem);font-style:italic;color:var(--dim);max-width:440px;line-height:1.7;margin-bottom:1.5rem}
.splash .sub{font-family:var(--serif);font-size:clamp(0.85rem,2vw,1.1rem);color:var(--dim);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:1.5rem}
.splash .desc{font-family:var(--serif);font-size:clamp(0.9rem,1.8vw,1.05rem);color:var(--parch);max-width:480px;line-height:1.8;margin-bottom:2rem}
.gbtn{font-family:var(--sans);font-size:0.82rem;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;color:var(--bg);background:var(--gold);border:none;padding:0.75rem 2rem;cursor:pointer;border-radius:2px;transition:all 0.3s}
.gbtn:hover{background:var(--goldL);box-shadow:0 4px 20px rgba(200,168,78,0.25)}
nav{position:sticky;top:0;z-index:100;background:rgba(10,21,10,0.97);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,168,78,0.1);padding:0.5rem 0.8rem;display:flex;align-items:center;gap:0.4rem;overflow-x:auto}
nav .brand{font-family:var(--serif);font-size:1rem;font-weight:700;color:var(--gold);margin-right:0.6rem;white-space:nowrap}
nav button{font-family:var(--sans);font-size:0.68rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);background:none;border:1px solid transparent;padding:0.4rem 0.7rem;cursor:pointer;white-space:nowrap;transition:all 0.25s}
nav button:hover{color:var(--goldL)}
nav button.on{color:var(--gold);border-color:var(--gold)}
.main{display:none;padding:1.2rem;max-width:1050px;margin:0 auto}
.main.vis{display:block}
.sec{display:none}.sec.vis{display:block}
.hdr{font-family:var(--serif);font-size:clamp(1.5rem,4vw,2.1rem);font-weight:700;color:var(--gold);margin-bottom:0.3rem}
.sub2{font-family:var(--serif);font-size:0.92rem;color:var(--dim);font-style:italic;margin-bottom:1.5rem}
.card{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid rgba(200,168,78,0.15);padding:1.2rem;border-radius:4px;transition:all 0.3s}
.card:hover{border-color:rgba(200,168,78,0.3)}
.prose{font-family:var(--serif);font-size:clamp(0.95rem,2vw,1.12rem);line-height:1.9;color:var(--parch)}
.prose p{margin-bottom:1rem}
.prose .hl{color:var(--gold);font-weight:600}
.prose .wh{font-style:italic;color:var(--dim)}
.img{width:100%;border-radius:6px;opacity:0.9;display:block}
.grid{display:grid;gap:0.8rem}
.g2{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.g3{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.tag{display:inline-block;font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:2px;margin-right:0.3rem}
.tag-g{background:rgba(74,139,158,0.12);color:var(--water);border:1px solid rgba(74,139,158,0.25)}
.tag-r{background:rgba(158,58,58,0.12);color:var(--dangerL);border:1px solid rgba(158,58,58,0.25)}
.tag-y{background:rgba(200,168,78,0.1);color:var(--gold);border:1px solid rgba(200,168,78,0.2)}
.rule{background:rgba(36,56,36,0.4);border-left:3px solid var(--gold);padding:1rem;margin-bottom:0.8rem;border-radius:2px}
.rule h4{font-family:var(--serif);font-size:1rem;color:var(--gold);margin-bottom:0.3rem}
.rule p{font-family:var(--serif);font-size:0.9rem;line-height:1.7;color:var(--parch)}
.board{display:grid;grid-template-columns:190px 1fr 150px;gap:0.8rem}
@media(max-width:800px){.board{grid-template-columns:1fr}.board>div:first-child,.board>div:last-child{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.3rem}}
.meter-label{font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim)}
.meter-val{font-family:var(--serif);font-size:1.1rem}
.meter-bar{height:5px;background:rgba(255,255,255,0.04);overflow:hidden;border-radius:2px;margin-bottom:0.5rem}
.meter-fill{height:100%;transition:width 0.6s ease;border-radius:2px}
.inst-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;max-width:480px;margin:0 auto}
.inst-btn{font-family:var(--sans);font-size:0.72rem;color:var(--light);background:rgba(200,168,78,0.05);border:1px solid rgba(200,168,78,0.12);padding:0.5rem 0.3rem;cursor:pointer;text-align:center;border-radius:2px;transition:all 0.2s;line-height:1.3}
.inst-btn:hover{background:rgba(200,168,78,0.12);border-color:var(--gold);transform:translateY(-1px)}
.inst-btn .ico{font-size:1.1rem}
.inst-btn .nm{font-weight:600;color:var(--gold)}
.inst-btn .ds{font-size:0.58rem;color:var(--dim);margin-top:2px}
.overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.96);flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;padding:2rem;overflow-y:auto}
.overlay.vis{display:flex}
.profile-card{text-align:left;border-left:3px solid var(--gold)}
.dim-bar{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.12rem}
.dim-bar .lbl{font-size:0.62rem;color:var(--dim);width:90px}
.dim-bar .track{flex:1;height:4px;background:rgba(255,255,255,0.04);border-radius:2px;overflow:hidden}
.dim-bar .fill{height:100%;border-radius:2px}
.dim-bar .val{font-size:0.58rem;width:28px;text-align:right}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

{name:"Ian",animal:"Hippo",icon:"🦛",role:"The Protector",theme:"Savior's burden vs. humility",persona:"The wild-hearted architect of the trip — immense in care, presence, and unseen labor. He carries others: their grief, their confusion, their aspirations, without complaint. He walks the riverbed of life as protector, buffer, anchor. Generosity has cost him: sleep, desire, breath. And now, on the edge of a new decade, he faces a haunting truth — his habitat, once sacred, is vanishing. Still, he builds. One last great gift — crafted for collective survival — offered not for applause, but because someone must try.",gift:"Stabilizes injured players",cost:"Cannot save everyone",ennea:9},
{name:"Onur",animal:"Elephant",icon:"🐘",role:"The Historian",theme:"Collective memory vs. forgetting",persona:"Turkish polymath, engineer, speaker of 8+ languages, scholar of Antiquity. A living archive whose memory spans civilizations. He remembers everything: who said what, where the wisdom lies, how the melodies of Rome and Anatolia echo in modern breath. But memory, for all its beauty, can harden into stone. The same precision that allows him to recall is what makes it hard for him to let go. New ideas bend against the walls of old truths.",gift:"Recalls past decisions to override errors",cost:"Burdened by history; struggles with new ideas",ennea:1},
{name:"Alex",animal:"Eagle",icon:"🦅",role:"The Seer",theme:"Stewardship vs. stasis",persona:"Yale Forestry grad, Buddhist, quiet mediator. He patrols vast territories of thought — watching, waiting, rarely calling out. With wings spanning over seven feet and eyes eight times more powerful than a human's, he sees patterns others miss. Yet for all his strength, he soars alone. His sharp vision may see far, but it cannot always see inward — where the heart quietly questions whether its clarity makes it closer to protector, or prisoner.",gift:"Unmatched high-altitude clarity; spots crises early",cost:"Solitary and detached; sees far but struggles to look inward",ennea:5},
{name:"Jorge",animal:"Cheetah",icon:"🐆",role:"The Tactician",theme:"Truth vs. cruelty",persona:"Direct, neurodivergent, tactical genius — 'Node/Now.' He moves through life with the logic of a blade: direct, unblinking, sharp. He can starve for clarity, fast for truth. He saves what others fear, including the snarling dogs of the SPCA, perhaps because he knows something about how pain becomes instinct. And yet, his gift can harden into law: right or wrong, friend or threat. Beneath his speed, logic, and steel lies a creature of profound restraint, whose greatest lesson may be that the most dangerous thing is not what you strike, but what you choose not to.",gift:"Speed and early warning in darkness",cost:"Blunt truths can cut both ways",ennea:3},
{name:"Dilraj",animal:"Giraffe",icon:"🦒",role:"The Navigator",theme:"Vision vs. manipulation",persona:"Punjabi Sikh elite, SF-based, brilliant but carrying relationship scars. He holds a view few others can access — broad, intuitive, elegant in its distance. From the lofty heights of elite education and dazzling charisma, he surveys the path ahead with visionary clarity. But height does not equal direction. The scars he carries — quiet, unseen beneath that graceful stride — may tangle his sense of movement. His gift is not in domination, but in quiet foresight — the ability to stand above, not apart.",gift:"Anticipatory insight; scans future crises",cost:"Withholding information is power",ennea:2},
{name:"Pablo",animal:"Lion",icon:"🦁",role:"The Guide",theme:"Beauty vs. decay",persona:"Spain to SF to NYC migrant; Google employee; incredibly well-read with a dystopian worldview. He walks between territories — never quite belonging to one land, always hearing the call of another. The lion's journey, like that of the Lion Tracker, is not to chase something, but to follow the feeling, to listen for the invisible thread that says: here. And yet, in his eyes is that eternal question — What if home was never where I was headed, but what I carried all along?",gift:"Leadership and aesthetic inspiration",cost:"Cynicism and fatalism; haunted by what is lost",ennea:8},
{name:"Yesim",animal:"Monkey",icon:"🐒",role:"The Trickster",theme:"Brilliance vs. self-doubt",persona:"Cornell-educated interior design savant focused on communal workspace; dreams of returning to Turkey. A marvel of precision and creativity — she builds what others cannot see: environments that spark communion and ideation, all while carrying the private ache of absence. The pressure to preserve, to protect, to plan, has hardened into control — but what if the answer lies not in strategy, but surrender? Play is not wasted. Joy is not frivolous. And sometimes, the branch we leap toward must be trusted before we know it will hold.",gift:"Wit, symbolic logic, agility; unlocks hidden clues",cost:"Brilliant ideas can outpace her trust in them",ennea:7}

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function $(id){return document.getElementById(id);}
function h(tag,attrs,children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){Object.assign(el.style,v);}
    else if(k.startsWith('on')){el.addEventListener(k.slice(2).toLowerCase(),v);}
    else el.setAttribute(k,v);
  });
  if(children){
    if(typeof children==='string')el.innerHTML=children;
    else if(Array.isArray(children))children.forEach(c=>{if(c)el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
    else el.appendChild(children);
  }
  return el;
}

function applyMeter(k,v){STATE.meters[k]=Math.max(0,Math.min(6,STATE.meters[k]+v));}

function getProfile(idx){
  const p=STATE.profiles[idx];if(p.turns===0)return null;
  const sorted=Object.entries(p.instinctTotals).sort((a,b)=>b[1]-a[1]);
  const dom=INSTINCTS.find(i=>i.id===sorted[0][0]);
  const sec=sorted[1]&&sorted[1][1]>0?INSTINCTS.find(i=>i.id===sorted[1][0]):null;
  const lowTop=Object.entries(p.lowStress).sort((a,b)=>b[1]-a[1])[0];
  const highTop=Object.entries(p.highStress).sort((a,b)=>b[1]-a[1])[0];
  const lowI=lowTop?INSTINCTS.find(i=>i.id===lowTop[0]):null;
  const highI=highTop?INSTINCTS.find(i=>i.id===highTop[0]):null;
  const shift=lowI&&highI&&lowI.id!==highI.id&&lowTop[1]>0&&highTop[1]>0;
  const ds=Object.entries(p.dims).sort((a,b)=>Math.abs(b[1])-Math.abs(a[1]));
  return{dom,sec,lowI,highI,shift,ds,sorted};
}

    <strong>Inferred core fear</strong> — the threat pattern your instincts are organized around<br><br>
    Not "you are a lion" — but your adaptive decision style within this group, under these conditions. A mirror, not a diagnosis.</p></div>

    <div class="rule"><h4>The Deeper Design</h4><p>The game uses <strong>Big Five-style dimensional math underneath</strong> with <strong>Enneagram-style archetypes on top</strong>. That gives you rigor <em>and</em> poetry. The hidden math is continuous and dimensional. The visible output is mythic and personal. The most powerful outcome is the gap — between who you think you are, and who you become when the watering hole is shrinking.</p></div>
  </div>`;
}

function renderPlay(el){
  const cp=PLAYERS[STATE.curPlayer];

  if(STATE.gamePhase==='profile'){
    renderProfiles(el);return;
  }

  // Meters panel
  let metersHtml='<div style="font-family:var(--serif);font-size:0.9rem;color:var(--gold);margin-bottom:0.6rem;border-bottom:1px solid rgba(200,168,78,0.15);padding-bottom:0.3rem">Ecosystem</div>';
  Object.entries(STATE.meters).forEach(([k,v])=>{
    metersHtml+=`<div style="margin-bottom:0.4rem">
      <div class="meter-label">${k}</div>
      <div class="meter-val">${v}/6</div>
      <div class="meter-bar"><div class="meter-fill" style="width:${Math.max(0,v/6*100)}%;background:${METER_COLORS[k]||'#c8a84e'}"></div></div>
    </div>`;
  });

  // Players panel
  let playersHtml='<div style="font-family:var(--serif);font-size:0.85rem;color:var(--gold);margin-bottom:0.6rem;border-bottom:1px solid rgba(200,168,78,0.15);padding-bottom:0.3rem">Players</div>';
  PLAYERS.forEach((p,i)=>{
    const active=i===STATE.curPlayer;
    playersHtml+=`<div style="display:flex;align-items:center;gap:0.3rem;padding:0.2rem ${active?'0.4rem':'0'};background:${active?'rgba(200,168,78,0.06)':'transparent'};border-radius:2px;margin:${active?'0 -0.4rem':'0'}">
      <span style="font-size:0.85rem">${p.icon}</span>
      <span style="font-size:0.7rem;flex:1">${p.name}</span>
      <span style="font-size:0.55rem;color:${STATE.profiles[i].turns>0?'var(--gold)':'var(--dim)'}">${STATE.profiles[i].turns>0?'✓':'·'}</span>
    </div>`;
  });

  // Center area
  let centerHtml='';

  if(STATE.gamePhase==='draw'){
    centerHtml=`
      <div style="font-family:var(--serif);font-size:1rem;color:var(--dim);margin-bottom:1rem">${cp.icon} ${cp.name} the ${cp.animal}</div>
      <div style="font-family:var(--serif);font-size:0.85rem;color:var(--parch);margin-bottom:1.5rem;font-style:italic">Round ${STATE.round+1} of ${STATE.soloMode?5:TOTAL_ROUNDS} · ${STATE.soloMode?'Solo Journey':'Group Safari'}</div>
      <button class="gbtn" onclick="drawScenario()">Draw Scenario Card</button>`;
  }

  if(STATE.gamePhase==='choose'&&STATE.scenario){
    const sc=STATE.scenario;
    let instBtns='';
    INSTINCTS.forEach(inst=>{
      instBtns+=`<button class="inst-btn" onclick="selectInstinct('${inst.id}')">
        <div class="ico">${inst.label.split(' ')[0]}</div>
        <div class="nm">${inst.name}</div>
        <div class="ds">${inst.desc}</div>
      </button>`;
    });
    centerHtml=`
      <div style="display:flex;gap:0.4rem;justify-content:center;margin-bottom:0.6rem">
        <span class="tag tag-r">Stress: ${sc.stress}/5</span>
        <span class="tag tag-y">Conflict: ${sc.conflict}/5</span>
      </div>
      <div style="font-family:var(--serif);font-size:clamp(0.95rem,2vw,1.1rem);line-height:1.6;color:var(--parch);max-width:440px;margin:0 auto 1rem">${sc.q}</div>
      <div style="font-size:0.68rem;color:var(--dim);margin-bottom:0.6rem;letter-spacing:0.05em">Which instinct guides ${cp.name}'s response?</div>
      ${STATE.round===0?'<div style="font-family:var(--serif);font-size:0.75rem;color:var(--goldL);margin-bottom:0.6rem;font-style:italic;max-width:380px;line-height:1.5">Each instinct has strengths and costs. There are no wrong answers — only honest ones.</div>':''}
      <div class="inst-grid">${instBtns}</div>`;
  }

  if(STATE.gamePhase==='rolling'&&STATE.chosenInstinct){
    const inst=STATE.chosenInstinct;
    centerHtml=`
      <div style="font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:0.3rem">${cp.name} chose ${inst.name}</div>
      <div style="font-size:1.5rem;margin-bottom:0.8rem">${inst.label}</div>
      <div style="font-family:var(--serif);font-size:0.95rem;color:var(--dim);margin-bottom:0.5rem">Rolling the dice of fate...</div>
      <div id="diceDisplay" style="font-size:4rem;margin:0.5rem 0;transition:all 0.1s">⚀</div>
      <div style="font-family:var(--serif);font-size:0.8rem;color:var(--dim);font-style:italic">Life is risk. The future, unknowable.</div>`;
  }

  if(STATE.gamePhase==='result'&&STATE.chosenInstinct){
    const inst=STATE.chosenInstinct;
    const sc=STATE.scenario;
    const sw=(1+(sc.stress-1)*0.15).toFixed(2);
    const roll=STATE.diceResult||4;
    const lucky=roll>=4;
    const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
    centerHtml=`
      <div style="font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);margin-bottom:0.2rem">Instinct Chosen</div>
      <div style="font-size:2.2rem;margin-bottom:0.2rem">${inst.label}</div>
      <div style="font-family:var(--serif);font-size:1.1rem;color:var(--gold);margin-bottom:0.4rem">${cp.name} leads with ${inst.name}</div>
      <div style="font-family:var(--serif);font-size:0.9rem;color:var(--parch);font-style:italic;margin-bottom:0.5rem">"${inst.desc}"</div>
      <div style="font-size:2.5rem;margin:0.3rem 0">${faces[roll-1]}</div>
      <div style="font-size:0.78rem;color:${lucky?'var(--water)':'var(--dangerL)'};margin-bottom:0.5rem;font-weight:600">${lucky?'Fate amplifies — rolled '+roll:'Friction — rolled '+roll}</div>
      <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:0.8rem">
        ${Object.entries(STATE.lastEffects||{}).map(([k,v])=>`<span class="tag ${v>0?'tag-g':'tag-r'}" style="font-size:0.72rem">${k} ${v>0?'+':''}${v}</span>`).join('')}
      </div>
      <div style="font-size:0.62rem;color:var(--dim);margin-bottom:1rem;font-style:italic">Shadow: ${inst.fear}</div>
      <button class="gbtn" onclick="nextTurn()">${STATE.round+1>=(STATE.soloMode?5:TOTAL_ROUNDS)?'See Your Portrait':'Next Round →'}</button>`;
  }

  el.innerHTML=`
    <h2 class="hdr">The Game Board</h2>
    <p class="sub2">${cp.icon} ${cp.name} the ${cp.animal} · Round ${STATE.round+1} of ${STATE.soloMode?5:TOTAL_ROUNDS}</p>
    <div class="board">
      <div class="card">${metersHtml}</div>
      <div class="card" style="min-height:380px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center">${centerHtml}</div>
      <div class="card">${playersHtml}</div>
    </div>`;
}

function drawScenario(){
  let avail=SCENARIOS.filter((_,i)=>!STATE.usedScenarios.includes(i));
  if(avail.length===0){STATE.usedScenarios=[];avail=SCENARIOS;}
  const idx=SCENARIOS.indexOf(pick(avail));
  STATE.usedScenarios.push(idx);
  STATE.scenario=SCENARIOS[idx];
  STATE.gamePhase='choose';
  STATE.chosenInstinct=null;
  render();
}

function selectInstinct(id){
  const inst=INSTINCTS.find(i=>i.id===id);
  STATE.chosenInstinct=inst;
  STATE.gamePhase='rolling';
  STATE.diceResult=null;
  render();
  // Animate dice
  const faces=['⚀','⚁','⚂','⚃','⚄','⚅'];
  let count=0;
  const iv=setInterval(()=>{
    const diceEl=$('diceDisplay');
    if(diceEl)diceEl.textContent=faces[Math.floor(Math.random()*6)];
    count++;
    if(count>14){
      clearInterval(iv);
      const roll=Math.floor(Math.random()*6)+1;
      STATE.diceResult=roll;
      if(diceEl)diceEl.textContent=faces[roll-1];
      // Now apply scoring
      const sc=STATE.scenario;
      const stressWeight=1+(sc.stress-1)*0.15;
      const lucky=roll>=4;
      const gain=2*stressWeight*(lucky?1.2:0.9);
      const p=STATE.profiles[STATE.curPlayer];
      p.instinctTotals[id]+=gain;
      Object.entries(inst.dims).forEach(([k,v])=>{p.dims[k]+=v*gain;});
      if(sc.stress<=2){p.lowStress[id]++;}else{p.highStress[id]++;}
      p.turns++;
      const fx=METER_EFFECTS[id]||{};
      STATE.lastEffects={};
      Object.entries(fx).forEach(([k,v])=>{
        const adj=lucky?(v>0?v+1:v):(v<0?v-1:v);
        STATE.lastEffects[k]=adj;
        applyMeter(k,adj);
      });
      setTimeout(()=>{STATE.gamePhase='result';render();},800);
    }
  },100);
}

function nextTurn(){
  const next=STATE.round+1;
  const maxRounds=STATE.soloMode?5:TOTAL_ROUNDS;
  if(next>=maxRounds){STATE.gamePhase='profile';render();return;}
  STATE.round=next;
  if(!STATE.soloMode)STATE.curPlayer=(STATE.curPlayer+1)%7;
  STATE.scenario=null;STATE.chosenInstinct=null;STATE.diceResult=null;STATE.gamePhase='draw';
  render();
}

function renderProfiles(el){
  let cards='';
  PLAYERS.forEach((player,i)=>{
    const prof=getProfile(i);
    if(!prof) return;

    let dimsHtml='';
    prof.ds.slice(0,5).forEach(([k,v])=>{
      dimsHtml+=`<div class="dim-bar">
        <span class="lbl">${DIM_LABELS[k]}</span>
        <div class="track"><div class="fill" style="width:${Math.min(100,Math.abs(v)*4)}%;background:${v>0?'var(--water)':'var(--dangerL)'}"></div></div>
        <span class="val" style="color:${v>0?'var(--water)':'var(--dangerL)'}">${v>0?'+':''}${v.toFixed(1)}</span>
      </div>`;
    });

    let shiftHtml='';
    if(prof.shift){
      shiftHtml=`<div style="margin-bottom:0.5rem;padding:0.4rem;background:rgba(158,58,58,0.07);border:1px solid rgba(158,58,58,0.12);border-radius:2px">
        <div style="font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dangerL);margin-bottom:0.15rem">Stress Shift Detected</div>
        <div style="font-family:var(--serif);font-size:0.82rem;color:var(--parch)">Low stress: ${prof.lowI.label} → High stress: ${prof.highI.label}</div>
        <div style="font-size:0.68rem;color:var(--dim);margin-top:0.15rem">Under pressure, you shifted from <strong>${prof.lowI.name}</strong> toward <strong>${prof.highI.name}</strong></div>
      </div>`;
    }

    cards+=`<div class="card profile-card">
      <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
        <span style="font-size:1.6rem">${player.icon}</span>
        <div>
          <div style="font-family:var(--serif);font-size:1.05rem;font-weight:700;color:var(--gold)">${player.name}</div>
          <div style="font-size:0.6rem;color:var(--dim)">Public archetype: ${player.animal} · Enneagram ${player.ennea}</div>
        </div>
      </div>
      <div style="margin-bottom:0.5rem">
        <div style="font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:0.15rem">Dominant Instinct</div>
        <div style="font-family:var(--serif);font-size:0.92rem;color:var(--parch)">${prof.dom.label} — ${prof.dom.name}</div>
        ${prof.sec?`<div style="font-size:0.7rem;color:var(--dim)">Secondary: ${prof.sec.label} ${prof.sec.name}</div>`:''}
      </div>
      ${shiftHtml}
      <div style="margin-bottom:0.5rem">
        <div style="font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:0.15rem">Inferred Core Fear</div>
        <div style="font-family:var(--serif);font-size:0.82rem;color:var(--parch)">${prof.dom.fear}</div>
      </div>
      <div style="margin-bottom:0.6rem">
        <div style="font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-bottom:0.2rem">Hidden Dimensions</div>
        ${dimsHtml}
      </div>
      <button onclick="sharePortrait(${i})" style="font-family:var(--sans);font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold);background:none;border:1px solid rgba(200,168,78,0.25);padding:0.3rem 0.8rem;cursor:pointer;border-radius:2px;width:100%">📋 Share Your Portrait</button>
    </div>`;
  });

  el.innerHTML=`
    <img src="${IMG.shift}" class="img" style="width:min(88%,380px);margin:0 auto 1.5rem;display:block">
    <h3 style="font-family:var(--serif);font-size:1.4rem;color:var(--gold);text-align:center;margin-bottom:0.2rem">The Mirror</h3>
    <p style="font-family:var(--serif);font-size:0.85rem;color:var(--dim);text-align:center;margin-bottom:0.3rem;font-style:italic">Your adaptive decision style within this group, under these conditions</p>
    <p style="font-family:var(--serif);font-size:0.78rem;color:var(--dim);text-align:center;margin-bottom:1.5rem">Not your permanent essence — but a mirror of who you become when the stakes are real.</p>
    <div class="grid g2">${cards}</div>
    <div style="text-align:center;margin-top:1.5rem">
      <button class="gbtn" onclick="resetGame()">Play Again</button>
    </div>`;
}

function sharePortrait(idx){
  const player=PLAYERS[idx];
  const prof=getProfile(idx);
  if(!prof)return;

  // Build shareable text
  let txt=`🌍 THE WATERING HOLE — Portrait\n\n`;
  txt+=`${player.icon} ${player.name} the ${player.animal}\n`;
  txt+=`Dominant instinct: ${prof.dom.label} — ${prof.dom.name}\n`;
  if(prof.sec)txt+=`Secondary: ${prof.sec.label} ${prof.sec.name}\n`;
  if(prof.shift)txt+=`Stress shift: ${prof.lowI.name} → ${prof.highI.name}\n`;
  txt+=`Core fear: ${prof.dom.fear}\n`;
  txt+=`\nDimensions: `;
  txt+=prof.ds.slice(0,4).map(([k,v])=>`${DIM_LABELS[k]} ${v>0?'+':''}${v.toFixed(1)}`).join(' · ');
  txt+=`\n\n"The game reveals not who you are — but who you become under pressure."`;

  // Build visual overlay for screenshot
  let dimsVis='';
  prof.ds.slice(0,5).forEach(([k,v])=>{
    dimsVis+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
      <span style="font-size:11px;color:#a09880;width:100px">${DIM_LABELS[k]}</span>
      <div style="flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="height:100%;width:${Math.min(100,Math.abs(v)*4)}%;background:${v>0?'#4a8b9e':'#c87070'};border-radius:3px"></div></div>
      <span style="font-size:10px;color:${v>0?'#4a8b9e':'#c87070'};width:32px;text-align:right">${v>0?'+':''}${v.toFixed(1)}</span>
    </div>`;
  });

  let shiftVis='';
  if(prof.shift){
    shiftVis=`<div style="margin:10px 0;padding:8px;background:rgba(158,58,58,0.08);border:1px solid rgba(158,58,58,0.15);border-radius:4px">
      <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#c87070;margin-bottom:3px">Stress Shift</div>
      <div style="font-family:Georgia,serif;font-size:14px;color:#e8dcc8">${prof.lowI.label} → ${prof.highI.label}</div>
    </div>`;
  }

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;overflow-y:auto';
  overlay.innerHTML=`
    <div style="background:linear-gradient(135deg,#1c2e1c,#0d1a0d);border:2px solid rgba(200,168,78,0.3);border-radius:8px;padding:1.5rem;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
      <div style="text-align:center;margin-bottom:1rem">
        <div style="font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:#a09880;margin-bottom:4px">The Watering Hole — Portrait</div>
        <div style="font-size:2.5rem">${player.icon}</div>
        <div style="font-family:Georgia,serif;font-size:1.3rem;font-weight:700;color:#c8a84e">${player.name}</div>
        <div style="font-size:0.7rem;color:#a09880">${player.animal} · Enneagram ${player.ennea}</div>
      </div>
      <div style="margin-bottom:10px">
        <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#a09880;margin-bottom:3px">Dominant Instinct</div>
        <div style="font-family:Georgia,serif;font-size:15px;color:#e8dcc8">${prof.dom.label} — ${prof.dom.name}</div>
        ${prof.sec?`<div style="font-size:12px;color:#a09880">Secondary: ${prof.sec.label} ${prof.sec.name}</div>`:''}
      </div>
      ${shiftVis}
      <div style="margin-bottom:10px">
        <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#a09880;margin-bottom:3px">Core Fear</div>
        <div style="font-family:Georgia,serif;font-size:14px;color:#e8dcc8">${prof.dom.fear}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:#a09880;margin-bottom:6px">Hidden Dimensions</div>
        ${dimsVis}
      </div>
      <div style="text-align:center;font-family:Georgia,serif;font-size:11px;color:#a09880;font-style:italic;border-top:1px solid rgba(200,168,78,0.12);padding-top:10px">
        "The game reveals not who you are —<br>but who you become under pressure."
      </div>
    </div>
    <div style="display:flex;gap:0.6rem;margin-top:1rem">
      <button onclick="copyPortrait(this)" class="gbtn" style="font-size:0.7rem;padding:0.5rem 1.2rem">📋 Copy Text</button>
      <button onclick="this.closest('div[style]').parentElement.remove()" style="font-family:var(--sans);font-size:0.7rem;color:var(--dim);background:none;border:1px solid rgba(200,168,78,0.2);padding:0.5rem 1.2rem;cursor:pointer;border-radius:2px">✕ Close</button>
    </div>`;

  overlay.dataset.shareText=txt;
  document.body.appendChild(overlay);
}

function copyPortrait(btn){
  const overlay=btn.closest('div[style]').parentElement;
  const txt=overlay.dataset.shareText;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      btn.textContent='✓ Copied!';
      btn.style.background='var(--water)';
      setTimeout(()=>{btn.textContent='📋 Copy Text';btn.style.background='var(--gold)';},2000);
    }).catch(()=>{
      prompt('Copy your portrait:',txt);
    });
  }else{
    prompt('Copy your portrait:',txt);
  }
}

function resetGame(){
  STATE.round=0;STATE.curPlayer=STATE.selectedAvatar||0;STATE.scenario=null;STATE.chosenInstinct=null;STATE.gamePhase='draw';STATE.diceResult=null;STATE.lastEffects={};
  STATE.meters={survival:3,trust:3,cohesion:3,clarity:3,morale:3,flexibility:3};
  STATE.usedScenarios=[];
  STATE.profiles=PLAYERS.map(()=>({
    instinctTotals:{elephant:0,lion:0,hippo:0,monkey:0,owl:0,meerkat:0,bonobo:0,peacock:0,songbird:0},
    dims:{agency:0,affiliation:0,structure:0,threat:0,meaning:0,image:0},
    lowStress:{elephant:0,lion:0,hippo:0,monkey:0,owl:0,meerkat:0,bonobo:0,peacock:0,songbird:0},
    highStress:{elephant:0,lion:0,hippo:0,monkey:0,owl:0,meerkat:0,bonobo:0,peacock:0,songbird:0},
    turns:0
  }));
  render();
}

// Boot
render();
</script>
</body>
</html>
