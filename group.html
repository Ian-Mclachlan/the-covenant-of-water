 /* ═══════════════════════════════════════════════════════════════
   CAMPFIRE ATMOSPHERE + STRESS ESCALATION
   ═══════════════════════════════════════════════════════════════ */

/* Ember particle layer — drifts upward through the scene */
#emberLayer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  opacity: 0;
  transition: opacity 1.5s ease;
}
.ember {
  position: absolute;
  width: 4px;
  height: 4px;
  bottom: -10px;
  background: radial-gradient(circle, #FFB347 0%, #D4603A 55%, transparent 100%);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(255, 179, 71, 0.6);
  filter: blur(0.4px);
  opacity: 0;
}
@keyframes emberRise {
  0%   { opacity: 0; transform: translateY(0) translateX(0) scale(1); }
  8%   { opacity: 1; }
  55%  { opacity: 0.85; transform: translateY(-55vh) translateX(14px) scale(0.9); }
  100% { opacity: 0; transform: translateY(-115vh) translateX(-8px) scale(0.3); }
}
.ember:nth-child(1)  { left: 8%;  animation: emberRise 9s  linear infinite; animation-delay: 0s; }
.ember:nth-child(2)  { left: 14%; animation: emberRise 11s linear infinite; animation-delay: 1.8s; }
.ember:nth-child(3)  { left: 22%; animation: emberRise 8.5s linear infinite; animation-delay: 3s; }
.ember:nth-child(4)  { left: 28%; animation: emberRise 12s linear infinite; animation-delay: 0.5s; }
.ember:nth-child(5)  { left: 35%; animation: emberRise 10s linear infinite; animation-delay: 4s; }
.ember:nth-child(6)  { left: 42%; animation: emberRise 7.8s linear infinite; animation-delay: 2s; }
.ember:nth-child(7)  { left: 48%; animation: emberRise 11.5s linear infinite; animation-delay: 5s; }
.ember:nth-child(8)  { left: 55%; animation: emberRise 9.5s linear infinite; animation-delay: 1.2s; }
.ember:nth-child(9)  { left: 62%; animation: emberRise 13s linear infinite; animation-delay: 3.8s; }
.ember:nth-child(10) { left: 69%; animation: emberRise 10.5s linear infinite; animation-delay: 0.8s; }
.ember:nth-child(11) { left: 76%; animation: emberRise 8.8s linear infinite; animation-delay: 4.5s; }
.ember:nth-child(12) { left: 82%; animation: emberRise 12.5s linear infinite; animation-delay: 2.5s; }
.ember:nth-child(13) { left: 89%; animation: emberRise 9.8s linear infinite; animation-delay: 5.5s; }
.ember:nth-child(14) { left: 94%; animation: emberRise 11.8s linear infinite; animation-delay: 1.5s; width: 3px; height: 3px; }
.ember:nth-child(15) { left: 18%; animation: emberRise 14s linear infinite; animation-delay: 6s;   width: 5px; height: 5px; }
.ember:nth-child(16) { left: 45%; animation: emberRise 13.5s linear infinite; animation-delay: 7s;  width: 5px; height: 5px; }
.ember:nth-child(17) { left: 72%; animation: emberRise 15s linear infinite; animation-delay: 8s;   width: 3px; height: 3px; }
.ember:nth-child(18) { left: 32%; animation: emberRise 12.8s linear infinite; animation-delay: 6.5s; width: 3px; height: 3px; }
.ember:nth-child(19) { left: 58%; animation: emberRise 10.8s linear infinite; animation-delay: 7.5s; width: 4px; height: 4px; }
.ember:nth-child(20) { left: 86%; animation: emberRise 14.5s linear infinite; animation-delay: 4.8s; width: 4px; height: 4px; }

/* Campfire glow — warm radial light emanating from bottom-center */
#campfireGlow {
  position: fixed;
  bottom: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 140%;
  height: 85%;
  pointer-events: none;
  z-index: 0;
  background: radial-gradient(ellipse at center bottom,
    rgba(255, 147, 41, 0.22) 0%,
    rgba(212, 96, 58, 0.14) 22%,
    rgba(180, 70, 40, 0.06) 45%,
    transparent 72%);
  opacity: 0;
  transition: opacity 1.8s ease;
  animation: campfireBreathe 5s ease-in-out infinite;
}
@keyframes campfireBreathe {
  0%, 100% { filter: brightness(1) saturate(1); }
  50%      { filter: brightness(1.15) saturate(1.1); }
}

/* Tier vignette — progressive corner darkening scales with stress */
#tierVignette {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 1.5s ease, box-shadow 1.5s ease;
}

/* ── Tier-based body classes ── */
body.tier-WONDER   #tierVignette { opacity: 0.35; box-shadow: inset 0 0 140px rgba(0, 0, 0, 0.30); }
body.tier-TENSION  #tierVignette { opacity: 0.55; box-shadow: inset 0 0 220px rgba(40, 15, 5, 0.50); }
body.tier-FRACTURE #tierVignette { opacity: 0.75; box-shadow: inset 0 0 300px rgba(80, 20, 10, 0.65); }
body.tier-ABYSS    #tierVignette { opacity: 0.92; box-shadow: inset 0 0 380px rgba(20, 5, 15, 0.85),
                                                              inset 0 0 140px rgba(100, 30, 20, 0.30); }
body.tier-MIRROR   #tierVignette { opacity: 0.60; box-shadow: inset 0 0 260px rgba(10, 20, 40, 0.55); }
body.tier-CAPSTONE #tierVignette { opacity: 0.82; box-shadow: inset 0 0 320px rgba(60, 20, 10, 0.70); }

/* Ember intensity scales with tier */
body.tier-WONDER   #emberLayer { opacity: 0.25; }
body.tier-TENSION  #emberLayer { opacity: 0.50; }
body.tier-FRACTURE #emberLayer { opacity: 0.80; }
body.tier-ABYSS    #emberLayer { opacity: 1.00; }
body.tier-MIRROR   #emberLayer { opacity: 0.35; }
body.tier-CAPSTONE #emberLayer { opacity: 1.00; }
body.tier-welcome  #emberLayer,
body.tier-setup    #emberLayer { opacity: 0; }

/* Campfire-specific atmosphere — kicks in during 'campfire' and 'capstone_discuss' phases */
body.atmo-campfire #campfireGlow { opacity: 1; }
body.atmo-campfire #emberLayer   { opacity: 1; }

/* Card warmth — inherits tier color, intensifies during campfire */
#root > div > div {
  transition: box-shadow 1.5s ease, border-color 1.5s ease;
}
body.tier-WONDER   #root > div > div { box-shadow: 0 0 30px rgba(212, 168, 68, 0.08), 0 6px 24px rgba(0, 0, 0, 0.35); }
body.tier-TENSION  #root > div > div { box-shadow: 0 0 45px rgba(212, 168, 68, 0.12), 0 8px 32px rgba(0, 0, 0, 0.45); }
body.tier-FRACTURE #root > div > div { box-shadow: 0 0 60px rgba(212, 96, 58, 0.16),  0 10px 40px rgba(0, 0, 0, 0.55); }
body.tier-ABYSS    #root > div > div { box-shadow: 0 0 80px rgba(184, 92, 58, 0.22),  0 12px 48px rgba(0, 0, 0, 0.65); }
body.tier-MIRROR   #root > div > div { box-shadow: 0 0 60px rgba(120, 150, 210, 0.12), 0 10px 40px rgba(0, 0, 0, 0.5); }
body.tier-CAPSTONE #root > div > div { box-shadow: 0 0 70px rgba(212, 96, 58, 0.18),  0 10px 40px rgba(0, 0, 0, 0.55); }

/* During the campfire phase, cards get extra warmth regardless of tier */
body.atmo-campfire #root > div > div {
  box-shadow: 0 0 90px rgba(255, 147, 41, 0.20), 0 12px 44px rgba(0, 0, 0, 0.55) !important;
}

/* Gentle card breathing during high-stress tiers */
body.tier-FRACTURE #root > div > div,
body.tier-ABYSS #root > div > div {
  animation: stressBreathe 5s ease-in-out infinite;
}
@keyframes stressBreathe {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.004); }
}

/* Accessibility — respect reduced motion preferences */
@media (prefers-reduced-motion: reduce) {
  #emberLayer, .ember,
  #campfireGlow,
  body.tier-FRACTURE #root > div > div,
  body.tier-ABYSS #root > div > div {
    animation: none !important;
  }
  #emberLayer { display: none; }
} 
</style>

<script type="text/babel">

const {useState,useEffect,useRef}=React;
const C={bg1:"#0A1A0C",bg2:"#152415",bg3:"#1E3322",gold:"#D4A844",rust:"#B85C3A",cream:"#F2ECDF",care:"#E8927C",equality:"#7CB5E8",prop:"#D4A844",loyalty:"#8B7355",authority:"#6B9E6B",purity:"#C9A0DC",red:"#D94F4F",green:"#4CAF6B"};
const FC={Care:C.care,Equality:C.equality,Proportionality:C.prop,Loyalty:C.loyalty,Authority:C.authority,Purity:C.purity};

const E={lion:"\ud83e\udd81",lock:"\ud83d\udd12",fire:"\ud83d\udd25",crystal:"\ud83d\udd2e",book:"\ud83d\udcda",lizard:"\ud83e\udd8e",ox:"\ud83d\udc03",eagle:"\ud83e\udd85",compass:"\ud83e\udded",thread:"\ud83e\uddf5",mag:"\ud83d\udd0d",target:"\ud83c\udfaf",ballot:"\ud83d\uddf3\ufe0f",mirror:"\ud83e\ude9e",globe:"\ud83c\udf0d",foot:"\ud83d\udc63",gear:"\u2699\ufe0f",zap:"\u26a1",anchor:"\u2693",scale:"\u2696\ufe0f"};

// ═══ BACKGROUND IMAGE LAYER ═══
const BG_MAP={
  WONDER:"img/bg-wonder.jpg",
  TENSION:"img/bg-tension.jpg",
  FRACTURE:"img/bg-river.jpg",
  ABYSS:"img/bg-montane.jpg",
  MIRROR:"img/bg-milkyway.jpg",
  CAPSTONE:"img/bg-campfire.jpg",
  welcome:"img/bg-splash.jpg",
  setup:"img/bg-splash.jpg"
};
function updateBgLayer(key){
  var el=document.getElementById('bgLayer');
  if(!el)return;
  var src=BG_MAP[key]||BG_MAP.welcome;
  var pos=(key==='FRACTURE')?'left center':(key==='ABYSS')?'60% center':'center center';
  if(el.getAttribute('data-bg')!==src){
    el.style.opacity='0';
    setTimeout(function(){
      el.style.backgroundImage='url('+src+')';
      el.style.backgroundPosition=pos;
      el.setAttribute('data-bg',src);
      el.style.opacity='1';
    },400);
  } else {
    el.style.backgroundPosition=pos;
  }
  // Sync tier class on <body> for atmospheric effects
  var body=document.body;
  ['WONDER','TENSION','FRACTURE','ABYSS','MIRROR','CAPSTONE','welcome','setup'].forEach(function(t){
    body.classList.remove('tier-'+t);
  });
  if(key) body.classList.add('tier-'+key);
}

// Toggle campfire/capstone atmosphere based on current phase
function updateAtmosphere(phase){
  var body=document.body;
  body.classList.remove('atmo-campfire');
  if(phase==='campfire' || phase==='capstone_discuss'){
    body.classList.add('atmo-campfire');
  }
}
// Preload background images
Object.values(BG_MAP).forEach(function(src){var img=new Image();img.src=src;});
const ALL=[{id:"GS-001",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Sacred",text:"A dung beetle navigates the Serengeti using the faint light of the Milky Way to roll its ball in a straight line. A fellow traveler reaches down to pick it up for a photo, disorienting its celestial alignment.",caf:"Care",options:[{t:"Speak up immediately to protect the beetle from unnecessary stress.",f:"Care",fw:{Care:0.85,Authority:0.15}},{t:"Remind the traveler that park rules strictly forbid touching wildlife.",f:"Authority",fw:{Authority:0.90}},{t:"Explain that every creature, no matter how small, deserves undisturbed passage.",f:"Equality",fw:{Equality:0.80,Care:0.25}},{t:"Silently step between the traveler and the beetle to block them.",f:"Purity",fw:{Purity:0.70,Care:0.30}}],teach:"Dung beetles are the first known non-human animals to use the Milky Way for navigation, confirmed by researchers at Wits University."},
{id:"GS-002",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Architecture",text:"A weaver bird has built the most architecturally complex nest on earth in an acacia tree right outside the lodge dining room. The lodge manager wants to remove it because guests are complaining about the noise.",caf:"Proportionality",options:[{t:"Offer to pay for earplugs for guests to save the bird's home.",f:"Proportionality",fw:{Proportionality:0.85,Care:0.20}},{t:"Tell the manager that destroying a nest violates the sanctity of the wilderness.",f:"Purity",fw:{Purity:0.90}},{t:"Organize your tour group to petition the manager to leave it.",f:"Loyalty",fw:{Loyalty:0.75,Equality:0.25}},{t:"Point out the biological marvel of the nest to guests so they appreciate it.",f:"Care",fw:{Care:0.80,Proportionality:0.15}}],teach:"Sociable weaver nests can host over 100 mating pairs and last for up to 100 years, functioning like avian apartment complexes."},
{id:"GS-003",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Symbiosis",text:"You watch bioluminescent plankton glowing in Lake Victoria at midnight. A guide mentions that agricultural runoff is slowly killing the algae that creates this phenomenon, and local farmers don't know.",caf:null,options:[{t:"Fund a local agricultural extension officer to teach sustainable farming.",f:"Care",fw:{Care:1.0}},{t:"Accept that human survival must balance with natural wonders.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Demand stricter government regulations on fertilizer use near the lake.",f:"Authority",fw:{Authority:1.0}},{t:"Mourn the loss of the pristine water as a tragic violation of nature.",f:"Purity",fw:{Purity:1.0}}],teach:"Lake Victoria supports the livelihoods of 40 million people, but agricultural runoff has created massive hypoxic 'dead zones'."},
{id:"GS-004",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Connection",text:"Two elephant families reunite in Samburu National Reserve after years apart. They are rumbling, flapping ears, and secreting from temporal glands. A loud tourist jeep speeds up to get closer, interrupting the reunion.",caf:null,options:[{t:"Yell at the driver to stop immediately.",f:"Authority",fw:{Authority:1.0}},{t:"Shield the view so your group prioritizes the animals' peace over photos.",f:"Care",fw:{Care:1.0}},{t:"Feel disgusted by the technological intrusion into a sacred biological moment.",f:"Purity",fw:{Purity:1.0}},{t:"Ask the driver to back up, offering a larger tip for respectful distance.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Elephants have specialized cells in their brains, similar to human spindle neurons, linked to social awareness and deep empathy."},
{id:"GS-005",tier:"WONDER",stress:4,cynefin:"Clear",theme:"Legacy",text:"You stand before the 3.6-million-year-old Laetoli footprints in Tanzania, where a parent and child walked in volcanic ash. A developer proposes building a glass walkway over them to boost local tourism revenue.",caf:null,options:[{t:"Support the walkway so local Tanzanians benefit equally from their heritage.",f:"Equality",fw:{Equality:1.0}},{t:"Oppose it; ancient sites should remain untouched and reverent.",f:"Purity",fw:{Purity:1.0}},{t:"Support it only if the archaeologists leading the site approve the structural safety.",f:"Authority",fw:{Authority:1.0}},{t:"Argue that the economic gain must outweigh the minor aesthetic disruption.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"The Laetoli footprints provided the first direct evidence of bipedalism in early hominins, preserved perfectly by a fortuitous rainstorm on volcanic ash."},
{id:"GS-006",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Symbiosis",text:"A red-billed oxpecker is eating ticks off a Cape Buffalo. The guide explains that if ticks are scarce, oxpeckers will peck at the buffalo's wounds to drink its blood. A photographer wants to scare the bird off to 'help' the buffalo.",caf:null,options:[{t:"Stop them; we must not interfere with the natural hierarchy and rules of the bush.",f:"Authority",fw:{Authority:1.0}},{t:"Let the buffalo manage its own body; it's a fair evolutionary trade-off.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Prevent the interference to keep the ecosystem untainted by human hands.",f:"Purity",fw:{Purity:1.0}},{t:"Explain that both animals have a right to exist without our intervention.",f:"Equality",fw:{Equality:1.0}}],teach:"Oxpeckers are technically considered 'semi-parasitic' because their wound-feeding behavior slows the healing of their hosts."},
{id:"GS-007",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Communication",text:"You hear the deep, resonant booming of an ostrich in the distance, which sounds exactly like a lion's roar. A nervous guest demands the guide immediately drive them back to camp, ruining the morning drive.",caf:null,options:[{t:"Comfort the guest, prioritizing their emotional safety over the drive.",f:"Care",fw:{Care:1.0}},{t:"Remind everyone that the group voted to stay out until noon.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Defer to the guide's expertise to reassure the guest that they are safe.",f:"Authority",fw:{Authority:1.0}},{t:"Insist everyone gets equal time on the safari, regardless of one person's fear.",f:"Equality",fw:{Equality:1.0}}],teach:"Male ostriches produce a low-frequency booming call to attract mates and claim territory, which tourists frequently mistake for lions."},
{id:"GS-008",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Stewardship",text:"In the Ngorongoro Crater, you spot a rare black rhino. A fellow tourist immediately starts live-streaming the location, which poachers have been known to use to track animals.",caf:null,options:[{t:"Report the tourist to the park rangers immediately.",f:"Authority",fw:{Authority:1.0}},{t:"Protect the rhino by blocking the tourist's camera lens.",f:"Care",fw:{Care:1.0}},{t:"Condemn the tourist for polluting a sacred encounter with social media.",f:"Purity",fw:{Purity:1.0}},{t:"Demand they turn it off so everyone has an equal chance to enjoy the moment quietly.",f:"Equality",fw:{Equality:1.0}}],teach:"Rhino poachers have utilized GPS metadata embedded in tourist social media posts to locate and kill rhinos in African parks."},
{id:"GS-009",tier:"WONDER",stress:4,cynefin:"Clear",theme:"Memory",text:"A matriarch elephant pauses to gently touch the skull of a deceased elephant with her trunk. The group falls silent, but a nearby jeep blares a radio. The driver says he's just doing his job keeping his guests entertained.",caf:null,options:[{t:"Stand with your safari group to collectively shame the other driver.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Value the sacred nature of animal grief and demand silence.",f:"Purity",fw:{Purity:1.0}},{t:"Recognize that the driver is just earning his wage and let it go.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Argue that the elephants deserve the same respect we'd give a human funeral.",f:"Equality",fw:{Equality:1.0}}],teach:"Elephants demonstrate 'corpse-directed behavior,' spending prolonged time investigating and gently touching the bones of their own species."},
{id:"GS-010",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Adaptation",text:"A giraffe splays its legs awkwardly to drink from a waterhole, making it highly vulnerable to lions. A photographer asks the guide to rev the engine to make the giraffe snap its head up for a better shot.",caf:null,options:[{t:"Refuse; putting a vulnerable animal on edge for a photo is cruel.",f:"Care",fw:{Care:1.0}},{t:"Remind the photographer that the guide is in charge, not the guests.",f:"Authority",fw:{Authority:1.0}},{t:"Point out that taking an artificial photo taints the authenticity of the wild.",f:"Purity",fw:{Purity:1.0}},{t:"Say everyone paid the same amount and we shouldn't cater to one photographer's whim.",f:"Equality",fw:{Equality:1.0}}],teach:"A giraffe's neck is too short to reach the ground; they must splay their legs or kneel, during which their specialized circulatory system prevents blood from rushing to their heads."},
{id:"GS-011",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Ingenuity",text:"You watch a chimpanzee in Kibale Forest carefully select a stick, strip the leaves, and use it to fish for termites. A child in your group wants to throw the chimp a candy bar as a reward for being 'smart'.",caf:null,options:[{t:"Stop the child to protect the chimp's health and diet.",f:"Care",fw:{Care:1.0}},{t:"Explain that feeding wildlife breaks the strict rules of the park.",f:"Authority",fw:{Authority:1.0}},{t:"Keep our human world and the animal world separate and untainted.",f:"Purity",fw:{Purity:1.0}},{t:"Explain that wild animals must earn their food naturally, just as humans do.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Chimpanzees in different regions of Africa have distinct 'cultures' of tool use, passing down specific techniques for termite fishing or nut cracking."},
{id:"GS-012",tier:"WONDER",stress:2,cynefin:"Clear",theme:"Coexistence",text:"A lilac-breasted roller dives to catch insects flushed out by an advancing bushfire. The fire was set by local pastoralists to promote new grass growth. Some tourists are outraged by the 'destruction'.",caf:null,options:[{t:"Defend the pastoralists' traditional right to manage the land.",f:"Authority",fw:{Authority:1.0}},{t:"Explain the ecological balance; the fire cleanses and renews the earth.",f:"Purity",fw:{Purity:1.0}},{t:"Point out the pastoralists need grass to survive just as much as the birds do.",f:"Equality",fw:{Equality:1.0}},{t:"Emphasize that the controlled burn prevents larger, more dangerous wildfires later.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Controlled burning has been used by East African pastoralists for centuries to manage tick populations and stimulate nutritious new grass."},
{id:"GS-013",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Instinct",text:"Hundreds of wildebeest hesitate at the edge of the Mara River, sensing crocodiles. Suddenly, one brave individual leaps, and the entire herd follows blindly. The guide mentions the first jumper rarely survives.",caf:null,options:[{t:"Marvel at the ultimate sacrifice for the survival of the herd.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Calculate that losing one to save thousands is a necessary natural equation.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Acknowledge the harsh but unchangeable laws of nature in motion.",f:"Authority",fw:{Authority:1.0}},{t:"Feel deep sorrow for the individual that gave its life.",f:"Care",fw:{Care:1.0}}],teach:"During the Great Migration, wildebeest have a 'swarm intelligence' where individual decisions are overridden by the movement of the mass."},
{id:"GS-014",tier:"WONDER",stress:4,cynefin:"Clear",theme:"Scale",text:"At night, you stare at the vast, unpolluted sky above the Rift Valley. You realize the starlight you are seeing left its source millions of years ago, right around the time the first hominids walked this valley.",caf:null,options:[{t:"Feel a profound sense of spiritual purity, untouched by modern lights.",f:"Purity",fw:{Purity:1.0}},{t:"Appreciate that everyone in your group is sharing this bonding moment.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Reflect on how small human lifetimes are compared to the cosmos.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Acknowledge that beneath these stars, all humans are fundamentally equal.",f:"Equality",fw:{Equality:1.0}}],teach:"The Great Rift Valley is one of the few places on earth where you can see the Milky Way while standing exactly where human evolution began."},
{id:"GS-015",tier:"WONDER",stress:3,cynefin:"Clear",theme:"Resilience",text:"A tiny dik-dik marks its territory with a tear duct gland. A tourist laughs, calling it 'pointless' since a lion will just ignore it. The guide seems offended by the tourist's arrogance.",caf:null,options:[{t:"Side with the guide; as guests, we must respect their deep knowledge of the bush.",f:"Authority",fw:{Authority:1.0}},{t:"Defend the dik-dik; all creatures' survival strategies are equally valid.",f:"Equality",fw:{Equality:1.0}},{t:"Explain that nature's complex designs are sacred and shouldn't be mocked.",f:"Purity",fw:{Purity:1.0}},{t:"Gently correct the tourist to protect the guide's feelings.",f:"Care",fw:{Care:1.0}}],teach:"Dik-diks mate for life and use preorbital gland secretions to carefully map out territories that can sustain them through severe droughts."},
{id:"GS-016",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Conservation",text:"A controversial proposal allows limited trophy hunting of old, non-breeding male lions in Tanzania. The $50,000 fee per lion goes entirely to funding anti-poaching patrols that save hundreds of other animals.",caf:"Proportionality",options:[{t:"Support it; the mathematical benefit of saving hundreds outweighs losing one.",f:"Proportionality",fw:{Proportionality:0.95}},{t:"Oppose it; killing for sport corrupts the sanctity of wildlife.",f:"Purity",fw:{Purity:0.90,Care:0.10}},{t:"Oppose it; every individual lion deserves protection from harm.",f:"Care",fw:{Care:0.90}},{t:"Support it only if local wildlife authorities strictly manage the permits.",f:"Authority",fw:{Authority:0.80,Proportionality:0.20}}],teach:"Trophy hunting in Sub-Saharan Africa generates over $200 million annually, much of which is directly mandated to fund conservation efforts where photo-tourism isn't viable."},
{id:"GS-017",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Land",text:"Maasai herders want to graze their cattle in a protected Serengeti corridor during a severe drought. If denied, their cattle will die. If allowed, they may spread disease to the migrating wildebeest.",caf:"Care",options:[{t:"Allow it; the Maasai have a traditional, sovereign right to their ancestral lands.",f:"Authority",fw:{Authority:0.75,Equality:0.25}},{t:"Protect the wildebeest; the ecological boundary must remain unviolated.",f:"Purity",fw:{Purity:0.90}},{t:"Allow it to prevent the herders and their families from suffering starvation.",f:"Care",fw:{Care:0.90,Equality:0.10}},{t:"Require the Maasai to cull their herds to match the carrying capacity of the land.",f:"Proportionality",fw:{Proportionality:0.85,Authority:0.15}}],teach:"Rinderpest, a disease introduced by European cattle, once wiped out 90% of the Serengeti's wildebeest before being eradicated globally in 2011."},
{id:"GS-018",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Medicine",text:"A Western pharmaceutical company discovers a potent anti-malarial compound in a plant used by Hadza hunter-gatherers. They offer the tribe a lump sum of $500,000 to patent it, which could save millions of lives globally.",caf:null,options:[{t:"Ensure the Hadza receive ongoing royalties equal to the drug's profits.",f:"Equality",fw:{Equality:1.0}},{t:"Patent it to prioritize saving millions of vulnerable children from malaria.",f:"Care",fw:{Care:1.0}},{t:"Refuse; traditional knowledge is sacred and shouldn't be commodified.",f:"Purity",fw:{Purity:1.0}},{t:"Stand with the tribe's elders, letting them make the final binding decision.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"The Hadza are one of the last true hunter-gatherer populations in Africa, numbering fewer than 1,300, and their land rights are under constant threat."},
{id:"GS-019",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Energy",text:"A massive new solar farm in Kenya will provide clean electricity to 100,000 homes, reducing reliance on fossil fuels. However, it blocks a historical elephant migration route, forcing the herd into conflict with nearby farms.",caf:"Proportionality",options:[{t:"Build the farm; the carbon reduction benefits the entire globe proportionately.",f:"Proportionality",fw:{Proportionality:0.90}},{t:"Halt the farm; we must protect the ancient, inviolable paths of the elephants.",f:"Purity",fw:{Purity:0.85,Care:0.15}},{t:"Relocate the farms to protect the villagers from elephant attacks.",f:"Care",fw:{Care:0.85,Proportionality:0.15}},{t:"Let the Kenyan government's energy ministry make the sovereign decision.",f:"Authority",fw:{Authority:0.90}}],teach:"Kenya generates over 90% of its electricity from renewable sources, but large infrastructure projects frequently sever vital wildlife corridors."},
{id:"GS-020",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Community",text:"To double the size of a lucrative Rwandan gorilla sanctuary, a local village must be relocated. The government offers them modern concrete homes and schools, but they will lose the land their ancestors are buried on.",caf:null,options:[{t:"Move the village to protect the critically endangered gorillas from extinction.",f:"Care",fw:{Care:1.0}},{t:"Ensure the villagers receive a fair, proportional cut of all future tourism revenue.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Respect the authority of the ancestral burial grounds and cancel the expansion.",f:"Authority",fw:{Authority:1.0}},{t:"Demand the village has an equal vote in the decision alongside the government.",f:"Equality",fw:{Equality:1.0}}],teach:"Mountain gorilla populations in the Virunga Massif have grown to over 1,000 individuals, largely due to intense, community-integrated conservation efforts."},
{id:"GS-021",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Education",text:"A nomadic Samburu family pulls their 12-year-old son out of a government school so he can tend the family's goats. A local NGO threatens to cut off the family's food aid if he doesn't return to class.",caf:null,options:[{t:"Support the NGO; enforcing educational standards is key to future stability.",f:"Authority",fw:{Authority:1.0}},{t:"Support the family; their traditional way of life must remain untainted.",f:"Purity",fw:{Purity:1.0}},{t:"Provide food aid anyway to prevent the family from going hungry.",f:"Care",fw:{Care:1.0}},{t:"Stand with the local community's right to determine their own children's future.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"In pastoralist communities in Kenya, boys are often required to manage livestock at young ages, leading to high dropout rates for males in specific regions."},
{id:"GS-022",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Economics",text:"A global carbon credit firm buys 50,000 acres of degraded Kenyan forest to plant non-native eucalyptus trees. This captures carbon quickly to sell to European airlines, but depletes the local water table.",caf:null,options:[{t:"Ban eucalyptus; the ecological integrity of the water table is sacred.",f:"Purity",fw:{Purity:1.0}},{t:"Tax the firm to ensure local farmers are fairly compensated for lost water.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Demand the global north reduces its own emissions rather than using Africa as a sink.",f:"Equality",fw:{Equality:1.0}},{t:"Protect the local farmers' livelihoods over the global carbon market.",f:"Care",fw:{Care:1.0}}],teach:"Eucalyptus trees are heavily thirsty 'fast-wood' species that can lower the water table by several meters, outcompeting native flora."},
{id:"GS-023",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Wildlife",text:"Wild dogs are hunting livestock outside a reserve. Farmers are setting out poisoned meat. Conservationists want to trap and collar the dogs to track them, but collaring often alters the pack's social dynamics.",caf:null,options:[{t:"Collar the dogs; the hierarchy of science and data must lead conservation.",f:"Authority",fw:{Authority:1.0}},{t:"Do not collar them; we should not pollute wild behavior with human tech.",f:"Purity",fw:{Purity:1.0}},{t:"Collar them only to prevent the dogs from dying a painful death by poison.",f:"Care",fw:{Care:1.0}},{t:"Subsidize the farmers so they bear the cost of living near predators equally.",f:"Equality",fw:{Equality:1.0}}],teach:"African painted dogs (wild dogs) are highly social, and tracking collars have been shown to sometimes impact their hunting efficiency and mating hierarchies."},
{id:"GS-024",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Water",text:"A luxury safari lodge uses thousands of gallons of water daily to maintain a green lawn for its guests. The neighboring village only has access to a single bore-hole that runs dry in the afternoon.",caf:null,options:[{t:"Force the lodge to distribute its water evenly with the village.",f:"Equality",fw:{Equality:1.0}},{t:"Accept that the lodge paid for the land rights and follows the law.",f:"Authority",fw:{Authority:1.0}},{t:"Mandate the lodge pay a heavy water tax to fund a new village well.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Feel disgusted by the artificial lawn in a natural savanna.",f:"Purity",fw:{Purity:1.0}}],teach:"A typical luxury lodge in East Africa can consume up to 15 times more water per capita than the surrounding local communities."},
{id:"GS-025",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Tourism",text:"You are on a 'cultural visit' to a Maasai Boma. The guide charges $50. You notice the villagers are wearing cheap imported beads instead of traditional ones, performing a shortened dance just for tips.",caf:null,options:[{t:"Pay the fee, recognizing it fairly compensates them for their labor and time.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Feel betrayed that the purity of their ancient culture has been commodified.",f:"Purity",fw:{Purity:1.0}},{t:"Ensure the money goes directly to feeding the village children.",f:"Care",fw:{Care:1.0}},{t:"Support your guide's business; he's part of your safari 'tribe' now.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"Many roadside Maasai Bomas are set up exclusively as tourist enterprises, operating more like living museums than authentic residential villages."},
{id:"GS-026",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Technology",text:"A park deploys autonomous drones to shoot paintballs at poachers. The drones successfully reduce elephant poaching by 80%, but they occasionally misidentify local firewood gatherers, terrifying them.",caf:null,options:[{t:"Ground the drones to protect innocent locals from psychological harm.",f:"Care",fw:{Care:1.0}},{t:"Keep the drones flying; saving 80% of elephants outweighs the accidents.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Require a human ranger to authorize every drone strike to maintain accountability.",f:"Authority",fw:{Authority:1.0}},{t:"Demand that tourists and locals are subjected to the exact same drone surveillance.",f:"Equality",fw:{Equality:1.0}}],teach:"Anti-poaching UAVs (drones) have been highly effective at night but struggle with algorithmic bias when distinguishing between poachers and pastoralists."},
{id:"GS-027",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Infrastructure",text:"A paved highway is proposed through the center of a national park. It will cut travel time for produce trucks in half, lowering food prices for the urban poor, but will result in massive wildlife roadkill.",caf:null,options:[{t:"Build the road to alleviate the suffering of the urban poor.",f:"Care",fw:{Care:1.0}},{t:"Block the road; the sanctity of the wilderness must remain unpaved.",f:"Purity",fw:{Purity:1.0}},{t:"Reroute it around the park, even if it costs the government twice as much.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Defer the decision entirely to the national wildlife management agency.",f:"Authority",fw:{Authority:1.0}}],teach:"The proposed Serengeti highway project threatened to sever the Great Migration route, prompting global outcry and a ruling from the East African Court of Justice."},
{id:"GS-028",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Agriculture",text:"A foreign NGO provides drought-resistant GMO maize seeds to farmers. The seeds yield double the crop, saving the village from famine, but the farmers are legally forbidden from saving seeds for next year.",caf:null,options:[{t:"Reject the seeds; food sovereignty should be free from corporate taint.",f:"Purity",fw:{Purity:1.0}},{t:"Take the seeds to ensure no child in the village starves this year.",f:"Care",fw:{Care:1.0}},{t:"Demand the company release the patent so all farmers have equal access.",f:"Equality",fw:{Equality:1.0}},{t:"Respect the intellectual property laws that funded the seed's creation.",f:"Authority",fw:{Authority:1.0}}],teach:"Several African nations ban GMOs due to fears that multinational corporations will monopolize the seed supply, undermining local agricultural independence."},
{id:"GS-029",tier:"TENSION",stress:5,cynefin:"Complicated",theme:"Wildlife",text:"A lioness gives birth to a severely deformed cub. Wildlife veterinarians observing the pride want to intervene and euthanize it to prevent a slow, agonizing death. The park warden says 'let nature take its course.'",caf:null,options:[{t:"Euthanize the cub immediately to spare it from pain.",f:"Care",fw:{Care:1.0}},{t:"Obey the warden; his rules govern the park.",f:"Authority",fw:{Authority:1.0}},{t:"Leave the cub; nature's brutal processes should remain unpolluted by human mercy.",f:"Purity",fw:{Purity:1.0}},{t:"Stand united with your safari group on whatever they decide.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"In most East African national parks, the strict non-intervention policy dictates that human veterinarians can only treat animals if the injury is human-caused (e.g., a snare)."},
{id:"GS-030",tier:"TENSION",stress:6,cynefin:"Complicated",theme:"Economics",text:"A women's microfinance group creates beautiful beadwork, but a middleman takes 70% of the profits before selling to tourists. If you bypass him and buy directly, he may cut the women off from future market access entirely.",caf:null,options:[{t:"Buy from the women directly to ensure they get their fair share.",f:"Equality",fw:{Equality:1.0}},{t:"Respect the middleman's established business structure and buy from him.",f:"Authority",fw:{Authority:1.0}},{t:"Assess the risk: buy from him now, but help the women build an online store.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Stand in solidarity with the women and organize a boycott of the middleman.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"Women in rural Kenya reinvest up to 90% of their income into their families, compared to 30-40% for men, making microfinance a critical development tool."},
{id:"GS-031",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Identity",text:"You are on a walking safari. The armed ranger tells you a rival tribe is poaching nearby. He spots a man in the bush and aims his rifle. The man is unarmed but carrying a wire snare. The ranger asks if he should shoot to wound.",caf:"Care",options:[{t:"Yell 'No!' to protect the unarmed man from grievous injury.",f:"Care",fw:{Care:0.90,Equality:0.15}},{t:"Defer to the ranger; he is the official enforcer of the law here.",f:"Authority",fw:{Authority:0.90}},{t:"Say 'Yes'; the punishment must match the crime of killing an elephant.",f:"Proportionality",fw:{Proportionality:0.80,Authority:0.20}},{t:"Refuse to be complicit; human violence stains the sanctity of the wild.",f:"Purity",fw:{Purity:0.85,Care:0.15}}],teach:"In several African countries, park rangers operate under 'shoot-to-kill' policies, leading to high-casualty conflicts with impoverished bushmeat hunters."},
{id:"GS-032",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Development",text:"A massive hydroelectric dam will provide reliable power to 15 million people in Ethiopia, lifting them out of poverty. However, it will severely reduce water flow to Lake Turkana, devastating the indigenous tribes who fish there.",caf:"Equality",options:[{t:"Build the dam; the sheer numbers of people escaping poverty mandate it.",f:"Proportionality",fw:{Proportionality:0.95}},{t:"Halt the dam to protect the ancient, sacred way of life of the Turkana people.",f:"Purity",fw:{Purity:0.85,Loyalty:0.15}},{t:"Halt the dam to protect the vulnerable tribesmen from immediate starvation.",f:"Care",fw:{Care:0.90}},{t:"Demand the electricity is distributed equally to the tribes to compensate them.",f:"Equality",fw:{Equality:0.85,Proportionality:0.15}}],teach:"The Gibe III dam on the Omo River in Ethiopia has altered the seasonal flooding of Lake Turkana, threatening the food security of 300,000 indigenous people."},
{id:"GS-033",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Justice",text:"You discover the conservation NGO you work for, the largest employer in the region, is quietly funding a militia that beats indigenous herders to keep them off the reserve. If you blow the whistle, the NGO will collapse, costing 500 local jobs.",caf:null,options:[{t:"Blow the whistle to protect the herders from further physical violence.",f:"Care",fw:{Care:1.0}},{t:"Keep quiet to remain loyal to your coworkers who rely on their salaries.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Report them to the government authorities and let the justice system decide.",f:"Authority",fw:{Authority:1.0}},{t:"Blow the whistle because systemic corruption is an intolerable stain.",f:"Purity",fw:{Purity:1.0}}],teach:"A major international wildlife charity was recently investigated by the US government for allegedly funding paramilitary anti-poaching units involved in human rights abuses."},
{id:"GS-034",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Survival",text:"A severely impoverished family plans to marry off their 14-year-old daughter for a dowry of 10 cows. The cows will provide milk that will keep her three younger siblings alive through the drought.",caf:null,options:[{t:"Condemn the practice; a child's body and future are sacred and non-negotiable.",f:"Purity",fw:{Purity:1.0}},{t:"Allow it to prevent the agonizing death of the three younger siblings.",f:"Care",fw:{Care:1.0}},{t:"Intervene and demand the girl has the same right to education as her brothers.",f:"Equality",fw:{Equality:1.0}},{t:"Respect the family patriarch's right to make survival decisions for his kin.",f:"Authority",fw:{Authority:1.0}}],teach:"UNICEF reports that during severe droughts in the Horn of Africa, child marriage rates can double as families use bride wealth as a coping mechanism."},
{id:"GS-035",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Science",text:"There are only 12 individuals of a specific frog species left. Scientists need to extract bone marrow to map their DNA and attempt cloning. The procedure has a 50% mortality rate. If they do nothing, the frogs will die out in 5 years.",caf:null,options:[{t:"Do the procedure; the math requires taking the risk to save the species.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Do not do it; we must not inflict terror and pain on the remaining survivors.",f:"Care",fw:{Care:1.0}},{t:"Do not do it; extinction is a natural law we should not artificially reverse.",f:"Purity",fw:{Purity:1.0}},{t:"Follow the exact recommendations of the International Union for Conservation of Nature.",f:"Authority",fw:{Authority:1.0}}],teach:"The Kihansi spray toad was declared extinct in the wild due to a dam project, but a captive breeding program managed to reintroduce a small population using intensive science."},
{id:"GS-036",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Economics",text:"You are staying at a lodge that costs $1,500 a night. You learn the local rangers, who risk their lives defending rhinos from armed syndicates, are paid $150 a month and lack basic health insurance.",caf:null,options:[{t:"Demand the lodge management restructure their pay to ensure basic fairness.",f:"Equality",fw:{Equality:1.0}},{t:"Pay directly for a wounded ranger's medical bills out of your own pocket.",f:"Care",fw:{Care:1.0}},{t:"Recognize that market forces dictate wages and leave it to the free market.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Rally your tour group to strike against the lodge until wages improve.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"A survey of African wildlife rangers found that 82% have faced a life-threatening situation, yet nearly half do not have access to adequate medical treatment."},
{id:"GS-037",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Culture",text:"A Maasai elder explains that killing a lion is a vital rite of passage for young warriors (Morans). A Western NGO offers the village a new school if they completely abandon the practice forever.",caf:null,options:[{t:"Take the school; modern education is more valuable than old rituals.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Reject the school; the purity of their ancestral tradition cannot be bought.",f:"Purity",fw:{Purity:1.0}},{t:"Decline the offer to remain loyal to the cultural identity of the tribe.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Demand the NGO provide the school without attaching cultural ultimatums.",f:"Equality",fw:{Equality:1.0}}],teach:"The 'Lion Guardians' program successfully transitioned Maasai warriors into lion protectors by blending traditional tracking skills with modern conservation wages."},
{id:"GS-038",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Sacrifice",text:"A flash flood traps your safari jeep. The water is rising fast. The driver tells you to abandon your heavy, expensive camera gear so the group can make a dash for high ground. Your life's work is on those drives.",caf:null,options:[{t:"Drop the gear immediately; group survival is the only thing that matters.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Obey the driver's command without question.",f:"Authority",fw:{Authority:1.0}},{t:"Keep the gear; you earned it, and you'll carry your own weight.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Ensure the oldest member of the group gets out first before you move.",f:"Care",fw:{Care:1.0}}],teach:"Flash floods in East African luggas (dry riverbeds) can rise several meters in minutes, often occurring when there is no rain visible locally."},
{id:"GS-039",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Complicity",text:"You buy a beautiful carved wooden giraffe at a market. Later, a guide tells you the wood was illegally logged from a protected forest, destroying the habitat of an endangered owl. You cannot return it.",caf:null,options:[{t:"Burn the carving; it is tainted by ecological sin.",f:"Purity",fw:{Purity:1.0}},{t:"Donate an equal amount of money to a reforestation charity.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Report the market vendor to the local police.",f:"Authority",fw:{Authority:1.0}},{t:"Forgive yourself; you didn't know and shouldn't carry the guilt.",f:"Care",fw:{Care:1.0}}],teach:"Illegal logging for the tourist curio trade is a major driver of deforestation in coastal East Africa, particularly affecting slow-growing hardwoods like ebony."},
{id:"GS-040",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Technology",text:"An ecologist wants to dart and tag a critically endangered pangolin. The tagging process causes the animal immense distress, and sometimes the trackers fall off. But without the data, the species will likely be poached to extinction.",caf:null,options:[{t:"Tag the animal; scientific knowledge is the ultimate authority in conservation.",f:"Authority",fw:{Authority:1.0}},{t:"Don't tag it; causing terror to a helpless creature is immoral.",f:"Care",fw:{Care:1.0}},{t:"Tag it; the data gathered justifies the temporary trauma.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Don't tag it; let the animal live its remaining days wild and untethered.",f:"Purity",fw:{Purity:1.0}}],teach:"Pangolins are the most trafficked mammals on earth, but they are highly susceptible to stress and frequently die in captivity or during research handling."},
{id:"GS-041",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Trust",text:"Your local guide confesses to you privately that he occasionally hunts bushmeat inside the park to feed his family because his safari wages are too low. If you report him, he goes to jail. If you don't, you are complicit in poaching.",caf:null,options:[{t:"Keep his secret to protect your friend and his hungry family.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Report him to the park warden; the law must be upheld.",f:"Authority",fw:{Authority:1.0}},{t:"Demand the safari company pays him a living wage so he stops.",f:"Equality",fw:{Equality:1.0}},{t:"Offer to pay for his groceries if he swears to stop hunting.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"During the COVID-19 pandemic, bushmeat poaching spiked massively in East Africa as tourism collapsed and lodge staff lost their incomes."},
{id:"GS-042",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Climate",text:"The glaciers on Mt. Kilimanjaro are melting. A geoengineering firm wants to spray reflective chemicals over the mountain to cool it and save the ice. The long-term effects on the soil below are completely unknown.",caf:null,options:[{t:"Do not spray; polluting the mountain with chemicals violates its sanctity.",f:"Purity",fw:{Purity:1.0}},{t:"Do not spray; the potential harm to the farmers below is too great a risk.",f:"Care",fw:{Care:1.0}},{t:"Spray it; we must take calculated risks to stop climate collapse.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Hold a referendum so all Tanzanians have an equal say in the mountain's fate.",f:"Equality",fw:{Equality:1.0}}],teach:"85% of the ice cover on Mount Kilimanjaro has disappeared since 1912, and scientists predict the mountain will be entirely ice-free within a few decades."},
{id:"GS-043",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Power",text:"A famous wildlife documentary crew is filming a cheetah hunt. The cheetah is starving and failing. The director orders the crew to throw a dead gazelle to the cheetah so they can film it eating and finish the episode.",caf:null,options:[{t:"Obey the director; he is in charge of the production.",f:"Authority",fw:{Authority:1.0}},{t:"Refuse; fabricating nature documentaries is a lie against the wild.",f:"Purity",fw:{Purity:1.0}},{t:"Help the cheetah; its suffering overrides journalistic integrity.",f:"Care",fw:{Care:1.0}},{t:"Refuse, standing with the camera operator who also objects.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"Several blue-chip nature documentaries have faced major scandals for staging scenes, merging different hunts, or using captive animals without disclosure."},
{id:"GS-044",tier:"FRACTURE",stress:8,cynefin:"Complex",theme:"Health",text:"A remote clinic only has enough anti-venom for one person. Two people are bitten by a Black Mamba: an 80-year-old tribal elder with immense cultural knowledge, and a 20-year-old mother of three.",caf:null,options:[{t:"Save the elder; respecting our ancestors and leaders is paramount.",f:"Authority",fw:{Authority:1.0}},{t:"Save the mother to ensure her three children are not orphaned and vulnerable.",f:"Care",fw:{Care:1.0}},{t:"Save the mother; she has more proportional life years left to live.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Save the elder to preserve the irreplaceable sacred wisdom of the tribe.",f:"Purity",fw:{Purity:1.0}}],teach:"Black Mamba venom is highly neurotoxic and can cause collapse in 45 minutes; snakebite envenoming kills over 30,000 people annually in Sub-Saharan Africa."},
{id:"GS-045",tier:"FRACTURE",stress:7,cynefin:"Complex",theme:"Ownership",text:"The government evicts a marginalized tribe to create a new national park. A wealthy tourist tells you, 'It's sad, but it's the only way to save the rhinos for the world.'",caf:null,options:[{t:"Argue that all people have an equal right to their ancestral lands.",f:"Equality",fw:{Equality:1.0}},{t:"Agree that the government has the right to manage its national borders.",f:"Authority",fw:{Authority:1.0}},{t:"Disagree, feeling sickened by the cruelty inflicted on the displaced tribe.",f:"Care",fw:{Care:1.0}},{t:"Agree that preserving the rhinos justifies the heavy human cost.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"The concept of 'fortress conservation' has led to the displacement of up to 14 million indigenous people across Africa in the name of creating pristine parks."},
{id:"GS-046",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Survival",text:"A multi-year drought has destroyed the harvest. A mother has no food. She must choose between selling her 12-year-old daughter into domestic servitude in the city, or watching all three of her children starve to death.",caf:null,options:[{t:"Sell the daughter; mathematically, saving two lives is better than zero.",f:"Proportionality",fw:{Proportionality:0.90,Care:0.10}},{t:"Do not sell her; selling a human being is a fundamental corruption of the soul.",f:"Purity",fw:{Purity:0.95}},{t:"Do not sell her; a mother must protect her child from abuse at all costs.",f:"Care",fw:{Care:0.90,Purity:0.10}},{t:"Beg the village elders to intervene and find a communal solution.",f:"Authority",fw:{Authority:0.70,Loyalty:0.30}}],teach:"During the 2011 Horn of Africa famine, over 250,000 people died, and human trafficking networks explicitly targeted starving families in rural camps."},
{id:"GS-047",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Migration",text:"Climate refugees fleeing desertification flood a border town that is already running out of water. The town's mayor orders armed police to blockade the wells to save the townspeople, leaving the refugees to die of thirst.",caf:null,options:[{t:"Support the blockade; the mayor's first duty is loyalty to his own citizens.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Break the blockade to provide water to the dying children outside the gates.",f:"Care",fw:{Care:1.0}},{t:"Demand the water is rationed strictly and equally among everyone, town and refugee alike.",f:"Equality",fw:{Equality:1.0}},{t:"Obey the police orders; law and order must be maintained to prevent a riot.",f:"Authority",fw:{Authority:1.0}}],teach:"The World Bank projects that by 2050, up to 86 million people in Sub-Saharan Africa could become internal climate migrants due to water scarcity."},
{id:"GS-048",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Pandemic",text:"A lethal hemorrhagic fever breaks out. A doctor at a rural clinic has one functioning ventilator. A government minister arrives, infected, demanding the machine. A local nurse is currently on it. The military threatens to shoot the doctor if he doesn't switch them.",caf:null,options:[{t:"Obey the military and give it to the minister to maintain state stability.",f:"Authority",fw:{Authority:1.0}},{t:"Refuse to pull the plug; active murder is an unforgivable moral stain.",f:"Purity",fw:{Purity:1.0}},{t:"Protect the nurse who got there first, treating all lives as strictly equal.",f:"Equality",fw:{Equality:1.0}},{t:"Stand with your medical staff and face the guns together.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"During Ebola outbreaks, healthcare workers are 21 to 32 times more likely to be infected than the general adult population."},
{id:"GS-049",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Technology",text:"A foreign tech conglomerate offers to install an AI surveillance web across a vast rural region. It will absolutely stop the rampant child-trafficking networks. However, the company will legally own all biometric and movement data of the indigenous population forever.",caf:null,options:[{t:"Accept the system; stopping child trafficking justifies any loss of privacy.",f:"Care",fw:{Care:1.0}},{t:"Reject it; selling the digital soul of a people to a corporation is obscene.",f:"Purity",fw:{Purity:1.0}},{t:"Demand the surveillance applies equally to the corporate executives and politicians.",f:"Equality",fw:{Equality:1.0}},{t:"Reject it; the cost of permanent technological subjugation outweighs the immediate safety.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Several African nations have imported extensive facial recognition and mass surveillance systems from foreign tech giants, often with zero domestic privacy legislation."},
{id:"GS-050",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Complicity",text:"You learn the luxury 'eco-lodge' where you are spending your honeymoon was built by violently displacing a local community. The armed guards at the gate are keeping the starving former residents out. Your money paid for the guards.",caf:null,options:[{t:"Flee the lodge immediately; you refuse to be tainted by this blood money.",f:"Purity",fw:{Purity:1.0}},{t:"Gather the other guests and demand the manager faces you.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Report the lodge to international human rights authorities.",f:"Authority",fw:{Authority:1.0}},{t:"Distribute all your remaining cash to the displaced people outside the gate.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"International tourism revenue in Africa rarely trickles down; studies show up to 80% of tourist money 'leaks' out of the local economy to foreign-owned operators."},
{id:"GS-051",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Justice",text:"A mob has cornered a man accused of poisoning a communal well, which killed three children. The police are hours away. The mob intends to burn him alive. If you intervene, they may turn their fury on you.",caf:null,options:[{t:"Intervene to save him; burning a man alive is an unconscionable horror.",f:"Care",fw:{Care:1.0}},{t:"Do not intervene; the community is enacting its own proportional vengeance.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Do not intervene; you must respect local tribal dynamics and not play savior.",f:"Authority",fw:{Authority:1.0}},{t:"Intervene because every human deserves a fair trial, no matter the crime.",f:"Equality",fw:{Equality:1.0}}],teach:"Mob justice or 'vigilantism' remains prevalent in areas with weak state police presence, often resulting in the lynching of innocent or marginalized individuals."},
{id:"GS-052",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Resource",text:"A massive swarm of desert locusts is devouring crops. The only way to stop them is to aerial spray a highly toxic pesticide that will also kill millions of bees, permanently collapsing the region's honey industry and wild pollination.",caf:null,options:[{t:"Spray the pesticide; saving the staple crops to prevent famine is the priority.",f:"Care",fw:{Care:1.0}},{t:"Do not spray; we cannot poison the sacred foundation of the ecosystem.",f:"Purity",fw:{Purity:1.0}},{t:"Spray it; the math of feeding humans outweighs the economic loss of honey.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Follow the exact directive of the Ministry of Agriculture.",f:"Authority",fw:{Authority:1.0}}],teach:"The 2019-2021 locust upsurge in East Africa was the worst in 70 years, threatening the food supply of 20 million people and requiring massive chemical intervention."},
{id:"GS-053",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Sacrifice",text:"Armed militants attack a wildlife sanctuary. You and ten others are hiding in a bunker. A baby begins to cry loudly, which will reveal your location to the killers. The mother cannot silence the child.",caf:null,options:[{t:"Smother the cries, even if it harms the baby, to save the group.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Protect the baby at all costs; harming an infant is the ultimate evil.",f:"Purity",fw:{Purity:1.0}},{t:"Stand closely around the mother in solidarity, whatever happens.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Treat everyone's life as equally valuable; we live or die together without sacrificing the child.",f:"Equality",fw:{Equality:1.0}}],teach:"During the Rwandan genocide, individuals hiding in swamps and ceilings faced impossible choices regarding crying infants to avoid detection by Interahamwe militias."},
{id:"GS-054",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Economics",text:"A foreign mining company discovers cobalt under a village. They offer the government $1 billion, which will build three new hospitals. The company will violently evict the villagers and use child labor in the mines.",caf:null,options:[{t:"Reject the deal; building hospitals on the backs of child slaves is abhorrent.",f:"Purity",fw:{Purity:1.0}},{t:"Reject the deal to protect the vulnerable children from mine labor.",f:"Care",fw:{Care:1.0}},{t:"Accept the deal; three national hospitals will save far more lives than the village loses.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Demand the mining profits are distributed equally to all citizens.",f:"Equality",fw:{Equality:1.0}}],teach:"Over 70% of the world's cobalt, essential for electric car batteries, comes from the DRC, where an estimated 40,000 children work in artisanal mines."},
{id:"GS-055",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Loyalty",text:"You are a local politician. A rebel group captures your town. They demand you execute three captured government soldiers to prove your loyalty to the revolution. If you refuse, they will slaughter your entire extended family.",caf:null,options:[{t:"Execute them to protect the lives of your innocent family members.",f:"Care",fw:{Care:1.0}},{t:"Refuse; murder stains the soul and cannot be justified.",f:"Purity",fw:{Purity:1.0}},{t:"Demand they pick the victims themselves to ensure you aren't an accomplice.",f:"Authority",fw:{Authority:1.0}},{t:"Offer your own life in exchange for the safety of the rest.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"The Rwanda Genocide featured 'Gacaca' courts later to manage the complex justice of neighbors who were forced to kill neighbors."},
{id:"GS-056",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Survival",text:"In a severe drought, a woman is caught stealing the last of the seed grain to feed her starving baby. Traditional law requires her to be exiled into the desert, which is a death sentence.",caf:null,options:[{t:"Protect the mother and child, prioritizing life over any traditional law.",f:"Care",fw:{Care:1.0}},{t:"Uphold the tribal law to ensure the survival of the group's future harvest.",f:"Authority",fw:{Authority:1.0}},{t:"Propose she work double for the next year to pay back the grain proportionally.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Demand that all villagers share their own seed grain equally to save her.",f:"Equality",fw:{Equality:1.0}}],teach:"Seed sovereignty is a critical issue in Africa; losing seed stock in a drought often leads to multi-year famines for entire regions."},
{id:"GS-057",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Complicity",text:"Your organization accidentally funded a warlord who used the money to buy weapons. He is now attacking a neighboring region. If you confess publicly, your global charity will be shut down, ending aid to millions.",caf:null,options:[{t:"Confess; institutional integrity and truth are sacred.",f:"Purity",fw:{Purity:1.0}},{t:"Cover it up to ensure millions of people don't lose their critical aid.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Cover it up to remain loyal to the mission of your organization.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Turn yourself in to the international criminal court to face justice.",f:"Authority",fw:{Authority:1.0}}],teach:"Humanitarian aid in conflict zones (like Somalia) is frequently 'taxed' or diverted by militant groups, creating agonizing dilemmas for NGOs."},
{id:"GS-058",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Health",text:"An experimental HIV vaccine has a 5% chance of causing permanent neurological damage. A researcher wants to test it on a desperate, uneducated population in a slum by offering them large sums of money. It could cure the virus.",caf:null,options:[{t:"Stop the trial to protect the vulnerable from being exploited.",f:"Care",fw:{Care:1.0}},{t:"Allow the trial; the math of curing millions justifies the tragic risk.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Stop the trial; exploiting poverty for medical science is impure and evil.",f:"Purity",fw:{Purity:1.0}},{t:"Demand the trial be conducted equally on wealthy western volunteers.",f:"Equality",fw:{Equality:1.0}}],teach:"Historical medical trials in Africa, like the Pfizer Trovan trial in Kano, Nigeria, have resulted in severe ethical breaches and long-lasting distrust of Western medicine."},
{id:"GS-059",tier:"ABYSS",stress:10,cynefin:"Chaotic",theme:"Power",text:"A dictator offers to build the largest wildlife corridor in Africa, saving thousands of elephants. In exchange, the international community must lift sanctions against him, allowing him to continue crushing political dissent.",caf:null,options:[{t:"Accept the deal; the animals are innocent and need saving.",f:"Care",fw:{Care:1.0}},{t:"Reject the deal; humans and animals deserve equal freedom from tyranny.",f:"Equality",fw:{Equality:1.0}},{t:"Reject the deal; we cannot legitimize a violent, illegitimate authority.",f:"Authority",fw:{Authority:1.0}},{t:"Accept the deal; the ecological impact outweighs the political cost.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Conservation is often heavily politicized; 'greenwashing' is used by authoritarian regimes to improve their international standing while suppressing domestic rights."},
{id:"GS-060",tier:"ABYSS",stress:9,cynefin:"Chaotic",theme:"Climate",text:"Due to sea-level rise, a coastal village in Kenya will be underwater in five years. The government will move them, but can only afford to move half the village to fertile land. The other half goes to a slum. You must decide who goes where.",caf:null,options:[{t:"Send the children and young mothers to the fertile land.",f:"Care",fw:{Care:1.0}},{t:"Draw a lottery so every single person has an equal chance.",f:"Equality",fw:{Equality:1.0}},{t:"Let the village elders make the final, binding decision.",f:"Authority",fw:{Authority:1.0}},{t:"Keep families strictly together, even if it means entire lineages go to the slum.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"Rising sea levels threaten coastal East African heritage sites and villages, accelerating the crisis of 'managed retreat' with no adequate funding."},
{id:"GS-061",tier:"MIRROR",stress:8,cynefin:"Complex",theme:"Complicity",text:"You calculate your carbon footprint for this single safari. The flights and jeep rides exceed the annual carbon emissions of an entire local village. You are playing a game about ecology while actively destroying it.",caf:null,options:[{t:"Feel profound guilt and vow to radically change your lifestyle.",f:"Purity",fw:{Purity:1.0}},{t:"Buy carbon offsets to mathematically balance your damage.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Argue that your tourist dollars do more good than the carbon does harm.",f:"Care",fw:{Care:1.0}},{t:"Acknowledge the hypocrisy, but stick with your group and enjoy the trip.",f:"Loyalty",fw:{Loyalty:1.0}}],teach:"A single round-trip flight from New York to Nairobi generates roughly 2.5 tons of CO2 per passenger, while the average Kenyan emits 0.3 tons per year."},
{id:"GS-062",tier:"MIRROR",stress:7,cynefin:"Complex",theme:"Power",text:"During this game, one member of your group has been quietly dominating the conversation, steering the votes to their preference. Do you disrupt the harmony to name this power dynamic?",caf:null,options:[{t:"Call it out to ensure everyone has an equal voice.",f:"Equality",fw:{Equality:1.0}},{t:"Stay quiet; maintaining group harmony and friendship is more important.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Check in with the quieter members privately to see if they are okay.",f:"Care",fw:{Care:1.0}},{t:"Respect the dominant player's natural leadership style.",f:"Authority",fw:{Authority:1.0}}],teach:"Psychological safety in groups\u2014the belief that you won't be punished for speaking up\u2014is the number one predictor of team success, according to Google's Project Aristotle."},
{id:"GS-063",tier:"MIRROR",stress:9,cynefin:"Chaotic",theme:"Truth",text:"A guide tells you in confidence that the 'authentic village visit' you all just cried at was a total performance. The real village refused tourists, so the lodge hired actors. Someone in your group says it was the most meaningful part of the trip.",caf:null,options:[{t:"Tell the group the truth; a profound experience built on a lie is tainted.",f:"Purity",fw:{Purity:1.0}},{t:"Keep the secret so your friend doesn't lose their beautiful memory.",f:"Care",fw:{Care:1.0}},{t:"Confront the lodge manager for deceptive business practices.",f:"Authority",fw:{Authority:1.0}},{t:"Let it go; the emotional impact on your friend was real, even if the context wasn't.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"The 'staged authenticity' of cultural tourism often leads to the commodification of culture, where locals perform stereotypes to satisfy Western expectations."},
{id:"GS-064",tier:"MIRROR",stress:8,cynefin:"Complex",theme:"Justice",text:"You discover the famous conservation fund you eagerly donated $500 to yesterday spends 80% of its budget on executive salaries and marketing in London, and only 20% on the ground in Kenya.",caf:null,options:[{t:"Demand a refund; the distribution of funds is unjust.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Report them to charity watchdog organizations.",f:"Authority",fw:{Authority:1.0}},{t:"Feel disgusted by the corruption of a supposedly pure mission.",f:"Purity",fw:{Purity:1.0}},{t:"Shrug it off and privately hand $500 directly to your local guide instead.",f:"Equality",fw:{Equality:1.0}}],teach:"Many high-profile 'mega-charities' have been criticized for massive overhead costs, leading to the rise of 'GiveDirectly' models that bypass administration entirely."},
{id:"GS-065",tier:"MIRROR",stress:7,cynefin:"Complex",theme:"Identity",text:"Someone in your group casually says, 'I don't think we should feel guilty for being tourists here. We earned our money.' The air in the jeep gets tense.",caf:null,options:[{t:"Agree with them to protect the unity and vibe of your friend group.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Gently remind them that global wealth is built on historic inequity.",f:"Equality",fw:{Equality:1.0}},{t:"Check the guide's reaction in the mirror to make sure they aren't hurt.",f:"Care",fw:{Care:1.0}},{t:"State that earning money justifies the trip, but doesn't erase responsibility.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"The concept of 'white saviorism' and unexamined privilege in global tourism has become a major focal point in decolonizing travel narratives."},
{id:"GS-066",tier:"MIRROR",stress:9,cynefin:"Chaotic",theme:"Hypocrisy",text:"You post a photo of a rhino with the caption 'Save the Rhinos'. A follower replies: 'You flew 8,000 miles to take that photo. Your lifestyle destroys more rhinos than poachers do.' You have the phone in your hand.",caf:null,options:[{t:"Delete the comment; it violates your personal boundaries.",f:"Authority",fw:{Authority:1.0}},{t:"Admit they are right and publicly reckon with your complicity.",f:"Purity",fw:{Purity:1.0}},{t:"Block them and text your group chat for emotional support.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Argue that the awareness you raise outweighs your flight emissions.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Aviation accounts for about 2.5% of global CO2 emissions, but only roughly 11% of the global population flew in 2018, highlighting extreme climate inequality."},
{id:"GS-067",tier:"MIRROR",stress:8,cynefin:"Complex",theme:"Empathy",text:"Your jeep drives past a woman carrying heavy firewood. A group member snaps a photo of her 'authentic struggle' without asking. She looks away in shame.",caf:null,options:[{t:"Tell your friend they must ask permission before photographing people.",f:"Authority",fw:{Authority:1.0}},{t:"Acknowledge the woman's pain and ask the driver to offer her a ride.",f:"Care",fw:{Care:1.0}},{t:"Demand your friend deletes the photo to respect her equal humanity.",f:"Equality",fw:{Equality:1.0}},{t:"Feel repulsed by the objectification of poverty for an aesthetic.",f:"Purity",fw:{Purity:1.0}}],teach:"The 'poverty porn' aesthetic in photography has been widely condemned by African journalists for stripping subjects of their dignity and agency."},
{id:"GS-068",tier:"MIRROR",stress:7,cynefin:"Complex",theme:"Comfort",text:"The lodge loses power for two hours. No AC, no ice. One of your friends begins yelling at the local staff about how much they paid for this trip.",caf:null,options:[{t:"Intervene to protect the staff from verbal abuse.",f:"Care",fw:{Care:1.0}},{t:"Pull your friend aside and remind them to respect the lodge rules.",f:"Authority",fw:{Authority:1.0}},{t:"Stand by your friend publicly, but privately tell them they are wrong.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Remind them that 600 million people in Africa lack reliable electricity.",f:"Proportionality",fw:{Proportionality:1.0}}],teach:"Sub-Saharan Africa has the lowest energy access rates in the world, with over half the population lacking access to electricity."},
{id:"GS-069",tier:"MIRROR",stress:9,cynefin:"Chaotic",theme:"Sacrifice",text:"During a terrifying close encounter with a charging elephant, someone in your group panicked, shoved another friend backward, and ran. No one was hurt, but now you are all sitting around the campfire in silence.",caf:null,options:[{t:"Call out the cowardice; running breaks the fundamental code of the group.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Check on the person who was shoved to make sure they feel safe.",f:"Care",fw:{Care:1.0}},{t:"Let the guide mediate the conflict; they are trained for this.",f:"Authority",fw:{Authority:1.0}},{t:"Forgive the runner; fear is an untamed instinct that overrides logic.",f:"Purity",fw:{Purity:1.0}}],teach:"Under extreme stress, the human amygdala can hijack the prefrontal cortex, causing an involuntary 'fight, flight, or freeze' response that bypasses conscious morality."},
{id:"GS-070",tier:"MIRROR",stress:8,cynefin:"Complex",theme:"Wealth",text:"You brought a bag of cheap plastic toys to hand out to children in villages, thinking it was generous. The guide gently tells you it encourages begging and creates plastic waste. You feel humiliated.",caf:null,options:[{t:"Accept the correction from the guide and put the toys away.",f:"Authority",fw:{Authority:1.0}},{t:"Feel disgusted by your own unexamined 'white savior' complex.",f:"Purity",fw:{Purity:1.0}},{t:"Give the toys to a local school teacher instead, so they are distributed fairly.",f:"Equality",fw:{Equality:1.0}},{t:"Give them out anyway because you want to see the children smile.",f:"Care",fw:{Care:1.0}}],teach:"Responsible travel organizations explicitly instruct tourists not to hand out items from vehicles, as it disrupts schooling and creates hazardous roadside begging."},
{id:"GS-071",tier:"MIRROR",stress:10,cynefin:"Chaotic",theme:"Validation",text:"You realize that the primary reason you came on this expensive safari wasn't to connect with nature, but to prove your status to people back home via Instagram. It hits you like a ton of bricks.",caf:null,options:[{t:"Put your phone away for the rest of the trip to cleanse your intentions.",f:"Purity",fw:{Purity:1.0}},{t:"Accept that humans are social creatures and status-seeking is proportional.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Confess this realization to the group and bond over your shared insecurities.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Commit to using your platform to elevate local African voices instead.",f:"Equality",fw:{Equality:1.0}}],teach:"Studies show that up to 40% of millennials choose their travel destinations based primarily on how 'Instagrammable' the location is."},
{id:"GS-072",tier:"MIRROR",stress:8,cynefin:"Complex",theme:"Value",text:"A wealthy member of your group offers the guide a $1,000 tip to break park rules and drive off-road to get closer to a cheetah kill. The guide looks incredibly torn. The fine is only $100 if caught.",caf:null,options:[{t:"Tell your friend to stop bribing people to break the rules.",f:"Authority",fw:{Authority:1.0}},{t:"Tell the guide you will match the $1,000 tip if he stays on the road.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Remind your friend that the animals deserve space, not harassment.",f:"Care",fw:{Care:1.0}},{t:"Feel angry that extreme wealth always believes it can buy access.",f:"Equality",fw:{Equality:1.0}}],teach:"Off-road driving by tourist vehicles causes severe soil compaction and destroys the micro-habitats of ground-nesting birds and insects."},
{id:"GS-073",tier:"MIRROR",stress:7,cynefin:"Complex",theme:"Perspective",text:"You are furious that it rained and ruined your afternoon game drive. Then you see the lodge staff dancing in the rain because the three-year drought has finally broken.",caf:null,options:[{t:"Feel ashamed of your selfish anger in the face of their sacred joy.",f:"Purity",fw:{Purity:1.0}},{t:"Join the staff in their dancing, celebrating their survival.",f:"Care",fw:{Care:1.0}},{t:"Reflect on how your temporary inconvenience is mathematically irrelevant.",f:"Proportionality",fw:{Proportionality:1.0}},{t:"Recognize that your expectations as a tourist do not supersede their reality.",f:"Equality",fw:{Equality:1.0}}],teach:"The 'Long Rains' in East Africa dictate the agricultural cycles; delayed rains instantly spike food prices and trigger massive livestock losses."},
{id:"GS-074",tier:"MIRROR",stress:9,cynefin:"Chaotic",theme:"Legacy",text:"At the end of the trip, you are asked to rate your guide. He was wonderful, but made one culturally insensitive joke about women. If you report it, he loses his license and his family starves. If you don't, you endorse it.",caf:null,options:[{t:"Give him a perfect rating to protect his livelihood.",f:"Loyalty",fw:{Loyalty:1.0}},{t:"Report the joke; official standards of conduct must be upheld.",f:"Authority",fw:{Authority:1.0}},{t:"Give him a perfect rating, but privately tell him why the joke was wrong.",f:"Care",fw:{Care:1.0}},{t:"Report it; ignoring sexism corrupts your own moral integrity.",f:"Purity",fw:{Purity:1.0}}],teach:"Tourism is a fragile industry; a single negative review can instantly destroy a freelance guide's access to future booking agencies."},
{id:"GS-075",tier:"MIRROR",stress:10,cynefin:"Chaotic",theme:"Meaning",text:"The game ends. You look at your friends. You realize you have all answered these questions based on who you WANT to be, not who you actually are. The mirror shows an idealized lie.",caf:"Proportionality",options:[{t:"Confess your inauthenticity to the group and ask them to do the same.",f:"Purity",fw:{Purity:0.80,Loyalty:0.20}},{t:"Accept that striving for a better ideal is a proportional step toward growth.",f:"Proportionality",fw:{Proportionality:0.75,Care:0.25}},{t:"Embrace your friends; the fact that you all tried to be good is enough.",f:"Loyalty",fw:{Loyalty:0.85,Care:0.15}},{t:"Acknowledge that everyone played by the same psychological rules.",f:"Equality",fw:{Equality:0.85}}],teach:"In psychometrics, 'social desirability bias' is the tendency of respondents to answer questions in a manner that will be viewed favorably by others, complicating self-reported data."}];
const CAPSTONES=[
{id:"CAP-001",text:"A viral hemorrhagic fever breaks out at a remote island lodge in Lake Victoria. There is only one evacuation boat left before a total military quarantine is enforced.",fragments:["The boat\u2019s hull is damaged and can only carry half its rated weight.","The 'sick' patient is actually a high-ranking WHO official carrying the only blood samples of the strain.","The mainland hospital has just reported it is at capacity and is turning away all islanders.","A local elder has identified the fever as a known historical 'bush-fire' sickness that responds to a specific root found on the island."],options:[{t:"Evacuate the WHO official; saving the samples could prevent a global pandemic.",f:"Care"},{t:"Hold a blind lottery for the remaining safe seats on the boat.",f:"Equality"},{t:"Give the seats to the youngest, healthiest laborers who have the best chance to survive.",f:"Proportionality"},{t:"Obey the military quarantine completely; no one leaves the island.",f:"Authority"}],teach:"During the 2014 Ebola outbreak, 'community-led' burials and traditional knowledge were often more effective at stopping transmission than top-down military quarantines. WHAT ACTUALLY HAPPENED: Governments initially relied on violent 'cordons sanitaires' (military blockades) in places like West Point, Liberia, which led to riots, starvation, and hidden transmission. WHY: State authorities prioritized the blunt mechanics of containment (Authority) out of fear and collapsing medical infrastructure, ignoring the sociological reality that trust and community consent (Loyalty/Care) are required to stop a virus."},
