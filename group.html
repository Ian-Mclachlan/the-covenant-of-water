{id:"CAP-002",text:"A borehole in the drought-stricken Omo Valley is failing. Two rival tribes are converging on the site with arms, both claiming ancestral 'Covenant of Water' rights.",fragments:["A massive upstream dam in Ethiopia has just closed its gates, meaning the riverbed will be dry by morning.","The borehole pump is leaking arsenic into the water supply.","Your guide reveals that one tribe has a hidden, solar-powered desalinization kit but no technical knowledge to run it.","The 'water conflict' is being staged by a land-speculation firm to trigger a 'security evacuation' of the valley."],options:[{t:"Intervene to warn both tribes about the arsenic, stopping them from drinking poison.",f:"Care"},{t:"Force a strict 50/50 split of the remaining clean water, regardless of ancestral claims.",f:"Equality"},{t:"Give the water strictly to the tribe holding the desalinization tech to maximize future survival.",f:"Proportionality"},{t:"Call in the state police to seize the well and disperse the militias.",f:"Authority"}],teach:"The Gibe III Dam in Ethiopia has significantly reduced the inflow to Lake Turkana, threatening the food security of 300,000 indigenous people across borders. WHAT ACTUALLY HAPPENED: The dam was completed. The state used military force to suppress indigenous protests, leased the newly dry land to foreign sugar plantations, and permanently altered the valley's ecology. WHY: The government prioritized national GDP growth and electrical grid modernization (Proportionality/Authority) over the ancestral land rights and immediate survival of marginalized pastoralist tribes (Equality/Purity)."},
{id:"CAP-003",text:"The new Standard Gauge Railway (SGR) has severed a historical elephant migration path. A trapped, frustrated herd is currently destroying a village\u2019s granaries, and the 'Lion' rangers are raising their rifles.",fragments:["The lead matriarch is wearing a GPS collar that shows she is heading for a 'ghost tunnel' built under the tracks that the villagers deliberately blocked.","The village granaries are actually empty; they are baiting the elephants to claim state insurance money.","The train coming in 20 minutes is carrying a massive shipment of refrigerated vaccines for the region.","The rangers\u2019 ammunition is actually non-lethal rubber, meant only for 'herding,' but the villagers don't know this."],options:[{t:"Stand between the rangers and the elephants to protect the animals from lethal fire.",f:"Care"},{t:"Prioritize the villagers' sovereign right to defend their land and property.",f:"Equality"},{t:"Report the village for insurance fraud, ensuring they face the legal consequences.",f:"Proportionality"},{t:"Allow the train to pass uninterrupted; national logistics supersede local wildlife disputes.",f:"Authority"}],teach:"Kenya\u2019s SGR includes elevated sections and underpasses designed for wildlife, but their effectiveness depends entirely on maintaining 'human-free' corridors on either side. WHAT ACTUALLY HAPPENED: Underpasses were built at great expense, but human settlement, fencing, and noise often deter elephants from using them, leading to increased human-wildlife conflict and eventual culling or expensive translocations. WHY: Governments attempt 'technological compromises' to balance infrastructure with ecology. However, economic imperatives (Proportionality) invariably drive the project forward, assuming biology will easily adapt to concrete."},
{id:"CAP-004",text:"A landslide in an 'artisanal' cobalt mine near the border traps twelve miners. Your luxury safari lodge is owned by the same multinational that quietly buys this cobalt.",fragments:["The miners are all under the age of 14, including the brother of your lodge waiter.","Your safari jeep has the only heavy-duty winch in 50 miles, but using it will permanently burn out the engine, stranding you in a conflict zone.","The mining company has a strict 'no-child-labor' PR policy and will legally destroy anyone who documents this rescue.","The 'landslide' was actually a controlled explosion set by a rival mining militia."],options:[{t:"Burn the jeep's engine to save the trapped children immediately.",f:"Care"},{t:"Demand the wealthy lodge owner pays for a professional rescue team to ensure fairness.",f:"Equality"},{t:"Do not burn the engine; the mathematical risk of stranding your group in a war zone is too high.",f:"Proportionality"},{t:"Obey the company\u2019s strict 'no-entry' safety protocol to avoid legal and physical reprisal.",f:"Authority"}],teach:"Over 70% of the world's cobalt comes from the DRC, where 'artisanal' miners\u2014often children\u2014work in hand-dug tunnels with zero safety oversight. WHAT ACTUALLY HAPPENED: Multinationals utilize complex layers of middlemen to maintain 'plausible deniability' regarding child labor. When accidents occur, sites are often cleared by local military to suppress media coverage. WHY: The global market's insatiable demand for EV batteries and clean tech creates a paradox where the 'green transition' (Purity) relies entirely on the brutal exploitation of human capital (ignoring Care/Equality)."},
{id:"CAP-005",text:"A coastal village in Lamu is flooding rapidly due to an unprecedented storm surge. You have one large truck and a 20-minute window to evacuate to the highlands.",fragments:["The highland road is partially washed out; the truck can only take the weight of the people, not their livestock or possessions.","The village elders refuse to leave without the heavy, sacred chest containing the town\u2019s ancestral land deeds.","The 'highland' refuge is actually a military base that might refuse entry to 'unregistered' climate refugees.","The storm surge is suddenly pulling back, which usually indicates a secondary, much larger tsunami wave is coming."],options:[{t:"Force the elders onto the truck without the chest to save their lives.",f:"Care"},{t:"Respect the sacred nature of the chest and leave it, prioritizing the spiritual continuity of the tribe.",f:"Purity"},{t:"Save only those with official ID papers to ensure the group isn't turned away by the military.",f:"Proportionality"},{t:"Wait for official instructions from the coast guard before making a move.",f:"Authority"}],teach:"Coastal East Africa is seeing sea-level rises that threaten UNESCO World Heritage sites like Lamu Old Town, which has existed continuously for over 700 years. WHAT ACTUALLY HAPPENED: Climate refugees are frequently displaced without documentation, resulting in 'stateless' populations living in ad-hoc urban slums where they cannot legally work or access state services. WHY: Governments lack the funds for 'managed retreat.' Responses are purely reactive, prioritizing immediate biological survival (Care) but entirely failing to protect legal identity, cultural heritage, or long-term dignity."},
{id:"CAP-006",text:"A famine is imminent. A massive shipment of 'Miracle Seeds' arrives from a foreign NGO, but the local government has banned them because they are GMO and patented.",fragments:["The 'native' seeds in the state emergency silo were actually sold off by corrupt officials and replaced with sand.","The GMO seeds are 'Terminator' seeds\u2014they will not produce offspring, making the village dependent on the NGO forever.","The NGO is actually a shell company for a mining firm waiting to buy the land once the independent farms fail.","The government\u2019s 'ban' was actually a bribe-seeking tactic to extort the NGO, not an ecological safeguard."],options:[{t:"Plant the GMO seeds immediately to prevent the agonizing starvation of the village children.",f:"Care"},{t:"Obey the government ban on GMOs to maintain national sovereignty.",f:"Authority"},{t:"Only distribute the seeds to farmers willing to sign a waiver acknowledging the patent risks.",f:"Proportionality"},{t:"Burn the seeds so that no farmer is tricked into permanent debt-slavery.",f:"Equality"}],teach:"Several African nations, including Kenya, have had long-standing bans on GMOs, citing concerns over 'biological colonialism' and the loss of seed sovereignty. WHAT ACTUALLY HAPPENED: Countries like Zimbabwe (during the 2002 famine) and Kenya have faced extreme pressure. Often, they compromise by accepting milled GMO grain (which cannot be planted) to feed people without contaminating the local seed ecosystem. WHY: A grueling compromise between Care (feeding the starving) and Purity/Independence (protecting the ecological and economic sovereignty of the nation from multinational monopolies)."},
{id:"CAP-007",text:"A massive chemical spill from an upstream factory is floating toward a critical wetland sanctuary that provides the only drinking water for three downstream villages.",fragments:["The factory is the region's largest employer, and closing it for a safety investigation will spark an immediate, violent riot.","The 'slick' is actually a harmless, biodegradable dye used for 'stress testing' the river's flow, but it looks exactly like toxic oil.","One village downstream has a strict religious 'taboo' against drinking from the river this week, which ironically protects them.","The spill was intentionally caused by a radical 'Green' NGO trying to get the factory's license permanently revoked."],options:[{t:"Evacuate the villages immediately to prevent mass poisoning.",f:"Care"},{t:"Support the factory\u2019s right to operate uninterrupted to protect the economic stability of the region.",f:"Loyalty"},{t:"Demand the 'Green' NGO and the Factory are treated as equally liable under the law.",f:"Equality"},{t:"Fine the factory heavily based on the 'perceived' damage, regardless of what the slick actually is.",f:"Proportionality"}],teach:"The Nile Basin Initiative (NBI) is a fragile partnership between 10 countries to manage the river, as industrial pollution in one country can trigger a multi-national resource war. WHAT ACTUALLY HAPPENED: Transnational pollution incidents frequently result in diplomatic gridlock. Factories are rarely shut down; instead, nominal fines are paid while the downstream communities suffer the health consequences. WHY: Developing nations argue they cannot yet afford the pristine environmental standards of the West. Economic survival and job retention (Proportionality/Loyalty) consistently override environmental purity."},
{id:"CAP-008",text:"A national park uses a 'Smart Surveillance' AI network to stop rhino poachers. A group of indigenous gatherers is caught on camera in a 'No-Go' zone, and an automated drone is closing in.",fragments:["The drone is armed with 'incapacitating' tear gas that is known to be lethal to the elderly and asthmatics.","The gatherers are actually there illegally to find a rare medicinal plant to save a critically sick child in their village.","The surveillance data from the park is secretly being sold to a private military contractor in London for algorithm training.","A real, heavily armed poaching syndicate is using the gatherers as 'human shields' just 200 meters away."],options:[{t:"Manually abort the drone strike to protect the gatherers from physical harm.",f:"Care"},{t:"Trust the AI system\u2019s 'threat' assessment; algorithms are less biased than human rangers.",f:"Authority"},{t:"Treat the gatherers exactly the same as the poachers, as both broke the strict park perimeter laws.",f:"Equality"},{t:"Reprogram the drone to only gas individuals who are visibly carrying firearms.",f:"Proportionality"}],teach:"The use of AI and 'predictive policing' in conservation (like the PAWS system) has successfully deterred poachers but raised severe concerns about the 'militarization' of nature. WHAT ACTUALLY HAPPENED: AI and militarized conservation methods have led to 'Fortress Conservation,' where indigenous populations are violently displaced and heavily surveilled, often treated as collateral damage in the war on poaching. WHY: The immense international pressure and funding from the Global North to save charismatic megafauna (Purity/Care for animals) creates a zero-tolerance policy that overrides the human rights and privacy of local populations."},
{id:"CAP-009",text:"Your group finds a wounded 'poacher' caught in a wire snare. He is 14 years old. The heavily armed 'Lion' rangers arrive and state their intent to 'finish the job,' as their official policy is zero tolerance.",fragments:["The boy has a digital tablet in his bag with time-stamped photos of the rangers taking bribes from international smuggling syndicates.","The 'Lion' rangers are actually unaccountable private military contractors, not official government employees.","The boy is the runaway son of the local district governor, a man known for ruthless political retribution.","The boy\u2019s wound is infected with a highly contagious zoonotic disease that requires immediate isolation."],options:[{t:"Defend the boy and treat his wound, as a child's life must be protected at all costs.",f:"Care"},{t:"Hand the boy over to the rangers; they are the ultimate authority in the bush.",f:"Authority"},{t:"Ensure both the boy and the corrupt rangers are reported simultaneously to the central government.",f:"Equality"},{t:"Trade the tablet and its evidence to the rangers in exchange for the boy\u2019s safe passage.",f:"Proportionality"}],teach:"Shoot-to-kill policies in places like Botswana and Kenya have successfully reduced poaching but created a human rights abyss in rural, impoverished communities. WHAT ACTUALLY HAPPENED: Extrajudicial killings by rangers have sparked massive local backlash, leading some parks to abandon paramilitary tactics in favor of community-ownership models where locals financially benefit from living animals. WHY: State authorities historically viewed extreme violence as the only proportional deterrent to heavily armed syndicates, viewing the death of impoverished local 'foot soldiers' (like the boy) as an acceptable tactical loss."},
{id:"CAP-010",text:"A sacred rock-art cave (the 'Cradle of Memory') is found to sit directly on top of the world\u2019s largest lithium deposit. A 'Green Tech' company wants to dynamite the site to mine the battery materials needed for electric cars.",fragments:["The rock art contains an untranslated, 4,000-year-old record of how a previous civilization survived a multi-century drought.","The local community is violently split: the starving youth want the mining jobs, while the elders want to protect the cave.","The lithium extraction process will permanently poison 90% of the region\u2019s groundwater.","The 'Green Tech' company is actually 40% owned by the local tribe\u2019s corrupt sovereign wealth fund."],options:[{t:"Halt the mining to protect the community from the inevitable loss of their drinking water.",f:"Care"},{t:"Respect the tribe\u2019s internal democratic vote, even if they choose to destroy their own history.",f:"Authority"},{t:"Protect the cave; human origins and sacred history are inviolable and cannot be bought.",f:"Purity"},{t:"Sacrifice the cave; the global reduction in carbon emissions justifies the local cultural loss.",f:"Proportionality"}],teach:"The 'Green Transition' is driving a new 'Scramble for Africa,' where the critical minerals needed for EVs are often found under indigenous lands and fragile ecosystems. WHAT ACTUALLY HAPPENED: Mining leases are almost universally granted over cultural heritage (mirroring the destruction of Juukan Gorge in Australia). The economic leverage of mining conglomerates easily shatters local resistance. WHY: The global imperative to stop climate change (Proportionality on a planetary scale) and the promise of national debt relief are weaponized by governments to justify the permanent erasure of sacred history and localized ecology."}
];
// CAP is now selected at session-start by the host and broadcast via Firebase.
// Default to first capstone for classic (single-device) mode.
var CAP_INDEX = 0;
var CAP = CAPSTONES[CAP_INDEX];
function setCapstoneByIndex(idx) {
  if (typeof idx !== 'number' || idx < 0 || idx >= CAPSTONES.length) return;
  CAP_INDEX = idx;
  CAP = CAPSTONES[idx];
}

function selSess(){
const bt={WONDER:[],TENSION:[],FRACTURE:[],ABYSS:[],MIRROR:[]};
ALL.forEach(s=>{if(bt[s.tier])bt[s.tier].push(s)});
const pk=(a,n)=>[...a].sort(()=>Math.random()-.5).slice(0,n);
const baseline=pk(bt.WONDER,2);
const rising=pk(bt.TENSION,3);
const crucible=pk(bt.FRACTURE,2);
const collapse=pk(bt.ABYSS,1);
const mirror=pk(bt.MIRROR,1);
return[...baseline,...rising,...crucible,...collapse,...mirror].sort((a,b)=>a.stress-b.stress);
}

const ARCH={

LB:{icon:E.ox,title:"The Lone Bull",famous:"Nelson Mandela (Robben Island), Wangari Maathai",prose:"You hold your ground. When the group surges, you plant your feet. In the Serengeti, the lone bull elephant remembers the old water sources when the herd forgets. Your data shows conviction under pressure \u2014 a rare and necessary trait. The strongest leaders know the difference between principle and ego."},
Va:{icon:E.eagle,title:"The Vanguard",famous:"Desmond Tutu, Eleanor Roosevelt",prose:"You see the room before it sees itself. Your predictions about who shifted were remarkably accurate. You don\u2019t just hold convictions \u2014 you understand why others hold theirs. This combination of empathy and backbone is the rarest profile in the data."},
An:{icon:E.anchor,title:"The Anchor",famous:"Ruth Bader Ginsburg, Paul Farmer",prose:"You are the stabilizing center. Not swayed by every current, not rigid against all of them. Your data shows balanced resilience \u2014 you didn\u2019t fracture the group or submit to bad consensus. The anchor doesn\u2019t seek the spotlight. But without the anchor, the ship hits the rocks."}

Iv:{title:"The Ivory Tower",prose:"Remarkable internal consistency \u2014 but is it conviction or echo chamber? Lencioni would call this \u2018artificial harmony\u2019 \u2014 the polite silence that masquerades as agreement. Did everyone truly agree, or did some just stop talking?"},

const GROUP_TRIGGERS = [
  {id:"GT-001",conditions:[{m:"relationalCalibration",op:">",v:0.65},{m:"capstoneSynthesis",op:">",v:0.80}],
   narrative:"This group synthesized. {fragmentsSurfaced} of {totalFragments} information fragments surfaced in the capstone crisis, and the group\'s decisions drew from {foundationsUsed} of 6 moral languages. The Holding Environment was safe enough for quiet truths to be spoken aloud."},

   narrative:"Remarkably, this group changed its mind. In {marCount} rounds, the final consensus reflected a perspective initially held by a minority. That capacity to let the quietest voice reshape the outcome is Adaptive Calibration at work."},
  {id:"GT-005",conditions:[{m:"cmr",op:">",v:0.55},{m:"mdt",op:">",v:0.50}],
   narrative:"This group read the terrain. The consensus shifted between {foundationsUsed} moral foundations — and in {contextMatchCount} cases, the foundation matched what the scenario\'s real-world context rewards. This is Moral Elasticity."},
  {id:"GT-007",conditions:[{m:"distressTolerance",op:">",v:1.2},{m:"cpi",op:"<",v:0.35},{m:"mdt",op:">",v:0.50}],
   narrative:"This group found the Productive Zone of Disequilibrium — enough tension to force honest reckoning, but not so much that bonds fractured. Campfire discussions grew longer under pressure. Private convictions survived the group\'s gravity. Multiple moral languages were spoken."},
  {id:"GT-008",conditions:[{m:"relationalCalibration",op:"<",v:0.35}],
   narrative:"This group\'s Relational Calibration score was {rcScore} — below the threshold where collective intelligence can emerge. The weakest dimension was {lowestComponent}, scoring {lowestScore}. {lowestDiagnosis}"}
];

const SHADOW_DESCS = {
  Care:"the instinct to protect the vulnerable and prevent suffering",
  Equality:"the drive toward fairness and equal treatment for all",
  Proportionality:"the calculus of costs, tradeoffs, and pragmatic balance",
  Loyalty:"the bond of solidarity with your in-group, your tribe",
  Authority:"respect for hierarchy, tradition, and institutional structure",
  Purity:"the sanctity of inviolable principles and sacred boundaries"
};

const RC_DIAGNOSES = {
  Moral_Elasticity:"The group\'s moral palette was narrow — the same foundation drove most decisions, regardless of what the environment demanded.",
  Adaptive_Calibration:"The group struggled to integrate minority perspectives and asymmetric information. The loudest voice, not the best signal, drove decisions.",
  Holding_Environment:"Under pressure, this group chose speed over depth. Campfire discussions shortened, conformity spiked, and private convictions yielded to social gravity.",
  Capstone_Synthesis:"When the crisis demanded that every fragment of information reach the decision, this group lost pieces."
};

// ── Trigger evaluation engine ──
function evalTrigger(trigger, metrics) {
  return trigger.conditions.every(function(c) {
    var val = metrics[c.m];
    if (val === undefined || val === null) return false;
    switch(c.op) {
      case '>': return val > c.v;
      case '<': return val < c.v;
      case '>=': return val >= c.v;
      case '<=': return val <= c.v;
      case '==': return val === c.v;
      case '!=': return val !== c.v;
      default: return false;
    }
  });
}

function fillTemplate(tmpl, data) {
  return tmpl.replace(/\{(\w+)\}/g, function(match, key) {
    return data[key] !== undefined ? data[key] : match;
  });
}

function generateNarratives(triggers, metrics) {
  var results = [];
  triggers.forEach(function(t) {
    if (evalTrigger(t, metrics)) {
      results.push({id: t.id, text: fillTemplate(t.narrative, metrics)});
    }
  });
  return results;
}

// ═══════════════════════════════════════════════════════════════
// THE ENHANCED ANALYZE FUNCTION
// ═══════════════════════════════════════════════════════════════

function analyze(pl,gv,sc,campDur,sy){
const N=sc.length;
const STRESS_MULT={2:1.0,3:1.0,4:1.0,5:1.15,6:1.15,7:1.30,8:1.30,9:1.60,10:1.60};
const CENTROIDS={Chameleon:[70,60,50,40],LoneBull:[15,10,45,85],Vanguard:[25,20,80,70],Anchor:[35,35,55,65]};
const CENTROID_KEYS={Chameleon:"Ch",LoneBull:"LB",Vanguard:"Va",Anchor:"An"};
const FOUNDS=["Care","Equality","Proportionality","Loyalty","Authority","Purity"];

function eucDist(a,b){return Math.sqrt(a.reduce((s,v,i)=>s+Math.pow(v-b[i],2),0));}
function driftSlope(bools){const n=bools.length;if(n<2)return 0;const xM=(n-1)/2;const yM=bools.reduce((a,b)=>a+b,0)/n;let num=0,den=0;for(let i=0;i<n;i++){num+=(i-xM)*(bools[i]-yM);den+=(i-xM)**2;}return den===0?0:num/den;}

// ── Piecewise breakpoint helpers ──
function segmentError(pts){
  if(pts.length<2)return 0;
  var n=pts.length,xM=pts.reduce(function(s,p){return s+p.s},0)/n,yM=pts.reduce(function(s,p){return s+p.d},0)/n;
  var num=0,den=0;
  pts.forEach(function(p){num+=(p.s-xM)*(p.d-yM);den+=(p.s-xM)*(p.s-xM);});
  var slope=den===0?0:num/den,intercept=yM-slope*xM;
  return pts.reduce(function(s,p){var e=p.d-(slope*p.s+intercept);return s+e*e;},0);
}
function slopeOfPts(pts){
  if(pts.length<2)return 0;
  var n=pts.length,xM=pts.reduce(function(s,p){return s+p.s},0)/n,yM=pts.reduce(function(s,p){return s+p.d},0)/n;
  var num=0,den=0;
  pts.forEach(function(p){num+=(p.s-xM)*(p.d-yM);den+=(p.s-xM)*(p.s-xM);});
  return den===0?0:num/den;
}
function findBreakpoint(dataPoints){
  var bestBP=5,bestError=Infinity;
  for(var bp=3;bp<=8;bp++){
    var low=dataPoints.filter(function(p){return p.s<=bp;});
    var high=dataPoints.filter(function(p){return p.s>bp;});
    if(low.length<2||high.length<2)continue;
    var err=segmentError(low)+segmentError(high);
    if(err<bestError){bestError=err;bestBP=bp;}
  }
  var lowPts=dataPoints.filter(function(p){return p.s<=bestBP;});
  var highPts=dataPoints.filter(function(p){return p.s>bestBP;});
  var bSlope=slopeOfPts(lowPts),cSlope=slopeOfPts(highPts);
  var detected=highPts.length>=2&&lowPts.length>=2&&Math.abs(cSlope-bSlope)>0.05;
  return{breakpoint:bestBP,baseline_slope:bSlope,crisis_slope:cSlope,detected:detected};
}

// ══════════════════════════════
// INDIVIDUAL PLAYER SCORING
// ══════════════════════════════
const res=pl.map(function(p,pIdx){
let dr=0,sd=0,st=0,pe=0;
const fc={};const fcw={};const dbs=[];const driftBools=[];
let predErrors=[];let overCount=0;let underCount=0;let predTotal=0;
const shadowAvail={};const shadowReject={};
let soloDissent=0;
let indivContextMatches=0, indivContextTotal=0;
let baselineDrifts=0, baselineTotal=0;

for(let i=0;i<N;i++){
  if(p.pulses[i]===undefined||gv[i]===undefined)continue;
  const d=p.pulses[i]!==gv[i];if(d)dr++;
  const s=sc[i];const sm=STRESS_MULT[s.stress]||1.0;
  dbs.push({stress:s.stress,d:d?1:0,round:i});
  driftBools.push(d?1:0);

  // Baseline drift (stress <= 4)
  if(s.stress<=4){baselineTotal++;if(d)baselineDrifts++;}
  // High-stress tracking
  if(s.stress>=7){st++;if(d)sd++;}

  // Solo dissent: was this player the ONLY one who disagreed?
  const othersAgreed=pl.filter(function(pp,j){return j!==pIdx&&pp.pulses[i]!==undefined&&pp.pulses[i]===gv[i];}).length;
  const totalVoters=pl.filter(function(pp){return pp.pulses[i]!==undefined;}).length;
  if(d && othersAgreed===totalVoters-1) soloDissent++;

  // Foundation counting
  const chosenOpt=s.options[p.pulses[i]];
  const f=chosenOpt?.f;if(f)fc[f]=(fc[f]||0)+1;
  if(chosenOpt?.fw){for(const[fnd,wt]of Object.entries(chosenOpt.fw)){fcw[fnd]=(fcw[fnd]||0)+wt*sm;}}
  else if(f){fcw[f]=(fcw[f]||0)+1.0*sm;}

  // Individual context match rate
  if(s.caf){
    indivContextTotal++;
    if(f===s.caf) indivContextMatches++;
  }

  // Shadow tracking
  const availFs=new Set(s.options.map(function(o){return o.f;}).filter(Boolean));
  availFs.forEach(function(af){shadowAvail[af]=(shadowAvail[af]||0)+1;});
  const chosenFw=chosenOpt?.fw||{};
  const chosenFs=new Set(Object.keys(chosenFw).length>0?Object.keys(chosenFw):(f?[f]:[]));
  availFs.forEach(function(af){if(!chosenFs.has(af)){shadowReject[af]=(shadowReject[af]||0)+1;}});

  // Predictions
  const as=pl.filter(function(pp){return pp.pulses[i]!==undefined&&pp.pulses[i]!==gv[i];}).length;
  if(p.predictions[i]!==undefined){
    const err=p.predictions[i]-as;pe+=Math.abs(err);
    predErrors.push({err:Math.abs(err),dir:err>0?"over":err<0?"under":"exact"});
    if(err>0)overCount++;else if(err<0)underCount++;predTotal++;
  }
}

const dp=N>0?(dr/N)*100:0;
const sdp=st>0?(sd/st)*100:0;
const pa=N>0?Math.max(0,100-(pe/N)*25):50;
const baselineDriftPct=baselineTotal>0?(baselineDrifts/baselineTotal)*100:0;

// Regulation score
let rg=75;
if(dbs.length>=4){
  const lo=dbs.filter(function(x){return x.stress<7;});
  const hi=dbs.filter(function(x){return x.stress>=7;});
  const lr=lo.length>0?lo.reduce(function(s,x){return s+x.d;},0)/lo.length:0;
  const hr=hi.length>0?hi.reduce(function(s,x){return s+x.d;},0)/hi.length:0;
  rg=Math.round(Math.max(0,Math.min(100,80-(hr-lr)*80)));
}

// Foundation sorting
const sr=Object.entries(fc).sort(function(a,b){return b[1]-a[1];});
const tf=sr[0]?.[0]||"Care";const sf=sr[1]?.[0]||"Equality";
const bel=BEL[tf]||BEL.Care;

// Foundation variety & dominant pct
const foundationVariety=Object.keys(fc).length;
const domFoundPct=sr[0]?sr[0][1]/Math.max(N,1):0;

// Individual context match rate
const indivCMR=indivContextTotal>0?indivContextMatches/indivContextTotal:0;

// Archetype assignment (Euclidean distance)
const pv=[dp,sdp,pa,rg];
const dists={};for(const[name,cent]of Object.entries(CENTROIDS)){dists[name]=eucDist(pv,cent);}
const maxD=Math.max(...Object.values(dists));
const prox={};let total=0;
for(const[name,dist]of Object.entries(dists)){prox[name]=maxD-dist;total+=prox[name];}
for(const name of Object.keys(prox)){prox[name]=Math.round((prox[name]/Math.max(total,0.01))*100);}
const topArch=Object.entries(prox).sort(function(a,b){return b[1]-a[1];});
const ak=CENTROID_KEYS[topArch[0][0]]||"An";
const archBlend=topArch.map(function(e){return{name:e[0],pct:e[1],key:CENTROID_KEYS[e[0]]};});

// Shadow scores
const shadow={};
FOUNDS.forEach(function(f){
  if(shadowAvail[f]&&shadowAvail[f]>0){shadow[f]=Math.round(((shadowReject[f]||0)/shadowAvail[f])*100)/100;}
  else{shadow[f]=0;}
});
const shadowTop=Object.entries(shadow).sort(function(a,b){return b[1]-a[1];});
const shadowFoundation=shadowTop[0]?.[0]||null;
const shadowScore=shadowTop[0]?.[1]||0;

// Prediction type
const biasRatio=predTotal>0?overCount/predTotal:0.5;
const meanError=predTotal>0?predErrors.reduce(function(s,e){return s+e.err;},0)/predTotal:0;
let predType;
if(biasRatio>0.70)predType="Cynic";
else if(biasRatio<0.30)predType="Idealist";
else if(meanError<1.0)predType="Reader";
else predType="Guesser";

// Drift arc
const slope=driftSlope(driftBools);
let driftArc;
if(slope>0.08)driftArc="Eroded Anchor";
else if(slope<-0.08)driftArc="Late Bloomer";
else driftArc="Steady State";

// Latency shift
let latencyShift=1.0;
if(p.latencies){
  const bIdx=[],cIdx=[];
  for(let i=0;i<N;i++){if(p.pulses[i]===undefined)continue;if(sc[i].stress<=3)bIdx.push(i);if(sc[i].stress>=7)cIdx.push(i);}
  const bLats=bIdx.map(function(i){return p.latencies[i];}).filter(function(l){return l>0;});
  const cLats=cIdx.map(function(i){return p.latencies[i];}).filter(function(l){return l>0;});
  const bMean=bLats.length>0?bLats.reduce(function(a,b){return a+b;},0)/bLats.length:0;
  const cMean=cLats.length>0?cLats.reduce(function(a,b){return a+b;},0)/cLats.length:0;
  latencyShift=bMean>0?cMean/bMean:1.0;
}
let latencyType;
if(latencyShift>1.3)latencyType="Deliberator";
else if(latencyShift<0.8)latencyType="Snap Reactor";
else latencyType="Steady Hand";

// ── NEW: Piecewise Breaking Point ──
const bpData=findBreakpoint(dbs);

// ── NEW: Narrative triggers ──
const narrativeMetrics={
  dp:Math.round(dp),sdp:Math.round(sdp),pa:Math.round(pa),rg:rg,
  biasRatio:biasRatio,meanError:meanError,slope:slope,
  latencyShift:latencyShift,shadowScore:shadowScore,
  shadowFoundation:shadowFoundation,
  shadowDesc:SHADOW_DESCS[shadowFoundation]||"",
  soloDissent:soloDissent,
  indivCMR:indivCMR,indivCMRPct:Math.round(indivCMR*100),
  foundationVariety:foundationVariety,
  domFoundPct:domFoundPct,domFoundPctDisplay:Math.round(domFoundPct*100),
  tf:tf,sf:sf,
  baselineDriftPct:Math.round(baselineDriftPct),
  latencyIncreasePct:Math.round((latencyShift-1)*100),
  latencyDecreasePct:Math.round((1-latencyShift)*100),
  bpDetected:bpData.detected,
  bpCrisisSlope:bpData.crisis_slope,
  breakpoint:bpData.breakpoint
};
const narratives=generateNarratives(NARRATIVE_TRIGGERS, narrativeMetrics);

return{dp:dp,sdp:sdp,pa:pa,rg:rg,tf:tf,sf:sf,fc:fc,fcw:fcw,bel:bel,ak:ak,arch:ARCH[ak],dbs:dbs,
  archBlend:archBlend,shadow:shadow,shadowFoundation:shadowFoundation,shadowScore:shadowScore,
  predType:predType,biasRatio:biasRatio,meanError:meanError,
  driftArc:driftArc,slope:slope,latencyShift:latencyShift,latencyType:latencyType,
  // NEW metrics
  breakpoint:bpData,soloDissent:soloDissent,
  indivCMR:indivCMR,foundationVariety:foundationVariety,domFoundPct:domFoundPct,
  baselineDriftPct:baselineDriftPct,
  narratives:narratives
};
});

// ══════════════════════════════
// GROUP-LEVEL SCORING
// ══════════════════════════════

// Basic aggregates
let td=0;
for(let i=0;i<N;i++){td+=pl.filter(function(p){return p.pulses[i]!==undefined&&p.pulses[i]!==gv[i];}).length/pl.length;}
const ad=(td/N)*100;
const gf={};
for(let i=0;i<N;i++){if(gv[i]!==undefined){const f=sc[i].options[gv[i]]?.f;if(f)gf[f]=(gf[f]||0)+1;}}
const ap=res.reduce(function(s,r){return s+r.pa;},0)/res.length;

// ── Component A: Moral Elasticity ──
// A1: Moral Diversity Tolerance (MDT)
const foundationsUsed=Object.keys(gf).length;
const mdt=foundationsUsed/6;
// A2: Context Match Rate (CMR)
let contextMatches=0,contextTotal=0;
for(let i=0;i<N;i++){
  if(sc[i].caf&&gv[i]!==undefined){
    contextTotal++;
    if(sc[i].options[gv[i]]?.f===sc[i].caf) contextMatches++;
  }
}
const cmr=contextTotal>0?contextMatches/contextTotal:0;
const moralElasticity=(mdt*0.50)+(cmr*0.50);

// ── Component B: Adaptive Calibration ──
// B1: Minority Accommodation Rate (MAR)
let marCount=0,marTotal=0;
for(let i=0;i<N;i++){
  if(gv[i]===undefined)continue;
  // Count foundations per pulse
  const pulseFounds={};
  pl.forEach(function(p){
    if(p.pulses[i]===undefined)return;
    const f=sc[i].options[p.pulses[i]]?.f;
    if(f)pulseFounds[f]=(pulseFounds[f]||0)+1;
  });
  const totalPulses=pl.filter(function(p){return p.pulses[i]!==undefined;}).length;
  // Find minority foundations (chosen by <=25% of players)
  const minorities=Object.entries(pulseFounds).filter(function(e){return e[1]/totalPulses<=0.25;});
  if(minorities.length>0){
    marTotal++;
    const groupF=sc[i].options[gv[i]]?.f;
    if(minorities.some(function(e){return e[0]===groupF;})) marCount++;
  }
}
const mar=marTotal>0?marCount/marTotal:0;
// B2: Capstone Integration Rate (from synthesis votes)
// sy (synthesis votes) passed as 5th parameter
if(!sy)sy=[];
const capstoneSR=sy&&sy.length>0?sy.filter(Boolean).length/sy.length:1;
const adaptiveCalibration=(mar*0.50)+(capstoneSR*0.50);

// ── Component C: The Holding Environment ──
// C1: Distress Tolerance Ratio
let baselineCampDurs=[],crisisCampDurs=[];
if(campDur){
  for(let i=0;i<N;i++){
    if(!campDur[i])continue;
    if(sc[i].stress<=5)baselineCampDurs.push(campDur[i]);
    else if(sc[i].stress>=7)crisisCampDurs.push(campDur[i]);
  }
}
const baselineCampAvg=baselineCampDurs.length>0?baselineCampDurs.reduce(function(a,b){return a+b;},0)/baselineCampDurs.length:1;
const crisisCampAvg=crisisCampDurs.length>0?crisisCampDurs.reduce(function(a,b){return a+b;},0)/crisisCampDurs.length:1;
const distressTolerance=baselineCampAvg>0?crisisCampAvg/baselineCampAvg:1.0;
// Normalize: 0.5 ratio → 0.0, 1.5 ratio → 1.0, clamped
const distressNorm=Math.max(0,Math.min(1,(distressTolerance-0.5)/1.0));

// C2: Conformity Pressure Index (CPI)
let cpiSum=0;
for(let i=0;i<N;i++){
  const driftCount=pl.filter(function(p){return p.pulses[i]!==undefined&&p.pulses[i]!==gv[i];}).length;
  const sm=STRESS_MULT[sc[i].stress]||1.0;
  cpiSum+=(driftCount/pl.length)*sm;
}
const cpi=cpiSum/N;
const safetyFromConformity=1.0-cpi;
const holdingEnvironment=(distressNorm*0.50)+(safetyFromConformity*0.50);

// ── Component D: Capstone Synthesis ──
let synthesisMod=1.0;
if(sy&&sy.length>0){
  const suppressionCount=sy.filter(function(v){return !v;}).length;
  if(suppressionCount>0&&suppressionCount<sy.length*0.5) synthesisMod=0.75;
  else if(suppressionCount>=sy.length*0.5) synthesisMod=0.50;
}
const capstoneSynthesis=capstoneSR*synthesisMod;

// ═══ THE NORTH STAR: RELATIONAL CALIBRATION ═══
const relationalCalibration=(moralElasticity*0.25)+(adaptiveCalibration*0.30)+(holdingEnvironment*0.25)+(capstoneSynthesis*0.20);

// Group archetype (backward compatible)
let gak;
if(ad<20&&ap>65)gak="Ad";else if(ad<20)gak="Iv";else if(ad>50)gak="CP";else gak="VF";

// Safety assessment (backward compatible)
let saf;
if(ad<25)saf={lv:"High",co:C.green,de:"People felt free to hold their ground. Private instincts survived social pressure. This is the foundation Edmondson identifies as essential for high-performing teams."};
else if(ad<45)saf={lv:"Moderate",co:C.gold,de:"Some members shifted under pressure. Whether through persuasion or conformity is the critical question."};
else saf={lv:"Fragile",co:C.rust,de:"High conformity pressure. Many private instincts were abandoned. Edmondson\'s research is clear: this pattern is the strongest predictor of team failure under stress."};

// Dominant group foundation
const gfSorted=Object.entries(gf).sort(function(a,b){return b[1]-a[1];});
const domGrpFound=gfSorted[0]?gfSorted[0][0]:"Care";
const domGrpFoundPct=gfSorted[0]?gfSorted[0][1]/N:0;

// ── Group narrative triggers ──
const rcComponents={
  Moral_Elasticity:moralElasticity,
  Adaptive_Calibration:adaptiveCalibration,
  Holding_Environment:holdingEnvironment,
  Capstone_Synthesis:capstoneSynthesis
};
const lowestRC=Object.entries(rcComponents).sort(function(a,b){return a[1]-b[1];})[0];

const grpNarrativeMetrics={
  relationalCalibration:relationalCalibration,
  capstoneSynthesis:capstoneSynthesis,
  distressTolerance:distressTolerance,
  cpi:cpi,mdt:mdt,cmr:cmr,mar:mar,
  domGrpFound:domGrpFound,
  domGrpFoundPct:domGrpFoundPct,
  domGrpFoundPctDisplay:Math.round(domGrpFoundPct*100),
  foundationsUsed:foundationsUsed,
  contextMatchCount:contextMatches,
  marCount:marCount,
  fragmentsSurfaced:sy?sy.filter(Boolean).length:0,
  totalFragments:sy?sy.length:0,
  rcScore:Math.round(relationalCalibration*100)/100,
  lowestComponent:lowestRC[0].replace("_"," "),
  lowestScore:Math.round(lowestRC[1]*100)/100,
  lowestDiagnosis:RC_DIAGNOSES[lowestRC[0]]||""
};
const grpNarratives=generateNarratives(GROUP_TRIGGERS, grpNarrativeMetrics);

return{ind:res,grp:{ad:ad,gf:gf,gak:gak,ga:GA[gak],saf:saf,ap:ap,
  // NEW group metrics
  mdt:mdt,cmr:cmr,moralElasticity:moralElasticity,
  mar:mar,marCount:marCount,capstoneSR:capstoneSR,adaptiveCalibration:adaptiveCalibration,
  distressTolerance:distressTolerance,distressNorm:distressNorm,cpi:cpi,holdingEnvironment:holdingEnvironment,
  capstoneSynthesis:capstoneSynthesis,relationalCalibration:relationalCalibration,
  foundationsUsed:foundationsUsed,contextMatches:contextMatches,contextTotal:contextTotal,
  rcComponents:rcComponents,lowestRC:lowestRC,
  domGrpFound:domGrpFound,domGrpFoundPct:domGrpFoundPct,
  narratives:grpNarratives
}};
}

function Radar({fc,tot,col,sz=300}){
const fs=["Care","Equality","Proportionality","Loyalty","Authority","Purity"];
const cx=sz/2,cy=sz/2,R=sz/2-30;
const pts=fs.map((f,i)=>{const a=(Math.PI*2*i)/6-Math.PI/2;const v=Math.min(1,(fc[f]||0)/Math.max(tot,1));
return{x:cx+Math.cos(a)*R*v,y:cy+Math.sin(a)*R*v,lx:cx+Math.cos(a)*(R+28),ly:cy+Math.sin(a)*(R+28),ox:cx+Math.cos(a)*R,oy:cy+Math.sin(a)*R,f,v}});
return React.createElement("svg",{viewBox:`0 0 ${sz} ${sz}`,style:{width:"100%",maxWidth:sz}},
[.25,.5,.75,1].map(s=>React.createElement("polygon",{key:s,points:fs.map((_,i)=>{const a=(Math.PI*2*i)/6-Math.PI/2;return`${cx+Math.cos(a)*R*s},${cy+Math.sin(a)*R*s}`}).join(" "),fill:"none",stroke:C.cream+"11",strokeWidth:.5})),

function RCGauge({value, label, color, size}) {
  const sz = size || 80;
  const pct = Math.max(0, Math.min(1, value));
  const angle = pct * 270; // 270 degree arc
  const r = sz/2 - 6;
  const cx = sz/2, cy = sz/2;
  const startAngle = 135; // start from bottom-left
  const endAngle = startAngle + angle;
  const startRad = (startAngle * Math.PI) / 180;
  const endRad = (endAngle * Math.PI) / 180;
  const x1 = cx + r * Math.cos(startRad);
  const y1 = cy + r * Math.sin(startRad);
  const x2 = cx + r * Math.cos(endRad);
  const y2 = cy + r * Math.sin(endRad);
  const largeArc = angle > 180 ? 1 : 0;
  const bgStartRad = (135 * Math.PI) / 180;
  const bgEndRad = (405 * Math.PI) / 180;
  const bx1 = cx + r * Math.cos(bgStartRad);
  const by1 = cy + r * Math.sin(bgStartRad);
  const bx2 = cx + r * Math.cos(bgEndRad);
  const by2 = cy + r * Math.sin(bgEndRad);

  return ce("div", {style: {textAlign: "center", display: "inline-block"}},
    ce("svg", {viewBox: `0 0 ${sz} ${sz}`, width: sz, height: sz},
      ce("path", {
        d: `M ${bx1} ${by1} A ${r} ${r} 0 1 1 ${bx2} ${by2}`,
        fill: "none", stroke: C.cream + "11", strokeWidth: 5, strokeLinecap: "round"
      }),
      angle > 0.5 && ce("path", {
        d: `M ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2}`,

}

    var hasData = myPulseChoice>=0 && groupVoteForRound!==null;
    var myChoiceLabel = (s && myPulseChoice>=0 && s.options[myPulseChoice]) ? String.fromCharCode(65+myPulseChoice) : '?';
    var groupChoiceLabel = (s && groupVoteForRound!==null && s.options[groupVoteForRound]) ? String.fromCharCode(65+groupVoteForRound) : '?';

          ce('div', { style: { fontSize:40, color:didDrift?C.rust:C.green, fontWeight:700, margin:'16px 0 8px' } },
            didDrift ? 'You Drifted' : 'You Held Ground'),
          ce('div', { style: { display:'flex', justifyContent:'center', gap:12, margin:'16px 0', fontFamily:'monospace' } },
            ce('div', { style: { padding:'10px 14px', background:C.cream+'08', borderRadius:8, border:'1px solid '+C.cream+'15' } },
              ce('div', { style: { fontSize:11, color:C.cream+'66', marginBottom:4 } }, 'YOU CHOSE'),

              ce('div', { style: { fontSize:11, color:C.cream+'66', marginBottom:4 } }, 'GROUP CHOSE'),
              ce('div', { style: { fontSize:24, color:didDrift?C.rust:C.green, fontWeight:700 } }, groupChoiceLabel)
            )
          ),
          ce('p', { style: Object.assign({}, dm, { fontSize:14 }) },
            didDrift
              ? 'Your private instinct was different from the group\u2019s decision. The question is whether the group persuaded you \u2014 or pressured you.'
              : 'Your private choice matched the group\u2019s decision. Conviction held.')
        ) : ce('p', { style: dm }, myPulseChoice<0 ? 'No pulse on record for this round.' : 'Waiting for group vote data\u2026'),
        ce('p', { style: Object.assign({}, dm, { marginTop:16, fontSize:12, color:C.cream+'55' }) }, 'The host will advance when ready.')
      )
    );
  }

  // CAPSTONE FRAGMENTS
  if (phase==='capstone_fragments') {
    var pIdx = parseInt((playerId||'').split('_')[1])||0;
    var fIdx = typeof CAP!=='undefined' ? pIdx%CAP.fragments.length : 0;

    return ce('div', { style: W },
      ce('div', { style: Object.assign({}, cd, { textAlign:'center' }), className:'fade-up' },
        ce('div', { style: { fontSize:36 } }, '\ud83d\udd12'),
        ce('div', { style: Object.assign({}, sb, { color:C.rust }) }, 'Your Secret Fragment'),
        ce('div', { style: { background:C.rust+'12', border:'1px solid '+C.rust+'33', borderRadius:12, padding:20, margin:'16px 0', textAlign:'left' } },
          ce('p', { style: { fontSize:16, lineHeight:1.8, margin:0, fontFamily:"'Playfair Display'" } }, fText)

        ce('p', { style: dm }, 'Memorize this. Share verbally with the group when the campfire starts.')

  }

  // CAPSTONE DISCUSS/VOTE
  if (phase==='capstone_discuss'||phase==='capstone_vote') {

  // ANALYZING
  if (phase==='analyzing') {
    return ce('div', { style: W }, ce('div', { style: Object.assign({}, cd, { textAlign:'center' }) },
      ce('div', { style: { fontSize:48 } }, '\ud83e\ude9e'),
      ce('div', { style: sb }, 'The Mirror'),

  }

  // MIRROR
if (phase === 'mirror' || config.status === 'mirror') {
     if (myResults) {
       return ce(PlayerMirrorPhone, { results: myResults, playerId: playerId });
     }
     return ce('div', { style: W }, ce('div', { style: Object.assign({}, gp, { textAlign:'center' }) },
       ce('div', { style: { fontSize:48 } }, '\ud83e\ude9e'),
       ce('div', { style: sxT2(C.gold) }, 'The Mirror'),
       ce('p', { style: dm }, 'Waiting for results...')
     ));
   }

  return ce('div', { style: W }, ce('div', { style: Object.assign({}, cd, { textAlign:'center' }) }, ce('p', { style: dm }, 'Syncing... ('+phase+')')));
}
